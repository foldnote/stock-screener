其他 $4.50亿（7%）。\n\nOcean 板块按调整后毛利已超过 River（$19.86亿 vs $18.98亿），是利润增长的主引擎。FY2025 新增 2 艘海洋邮轮驱动 +30.6% 增长。\n\n### 赚钱机制\n- **高毛利重资产**：毛利率 43.3%（FY2025），对重资产公司而言异常高，驱动力是品牌溢价定价（非成本领先）\n- **经营杠杆强**：运营利润率从 FY2022 的 2.0% 扩张至 FY2025 的 23.1%——船只固定成本被更高的入住率和定价摊薄\n- **预收款模式**：递延收入 $46.05亿（客户提前 12+ 月预订），提供强大的现金流可见性\n- **近零税率**：百慕大注册 + 航运收入豁免 → 有效税率 1.7%，是盈利能力的关键结构性优势\n- **新船回收期短**：海洋邮轮 5-6 年、河轮 4-5 年回本\n\n### 产业链位置\n- **上游**：造船厂（主要为欧洲船厂）。造船合同锁定价格和交期，但已出现延迟（6 艘河轮推迟到 2026 年晚些）\n- **下游**：直接面向终端消费者 + 旅行社分销。佣金及交通费 $13.60亿（收入占比 20.9%）\n- **燃料**：仅占收入 2.7%（$1.73亿），远低于行业平均，因为小型船舶更节能\n- Viking 在价值链中有较强定价权：52% 北美河轮市场份额，27% 豪华海洋邮轮市场份额\n\n### 市场空间\n- 全球豪华邮轮：$120.5亿（2025）→ 预测 $271亿（2037），CAGR ~7%\n- 河轮市场：~$20亿（2025），CAGR 14.4% 至 2033\n- 全球邮轮乘客：3,720万（2025）→ 预测 4,200万（2030），CAGR 6.2%\n- Viking 仅占全球乘客 0.8% 但贡献 4.2% 行业收入 → 每位乘客收入密度远超行业平均\n\n### 商业模式可持续性\nViking 的核心差异化（无儿童、目的地文化教育、55+ 富裕群体）在可预见的未来不会消失。人口老龄化 + 富裕退休人口增长是结构性顺风。50%+ 的复购率说明客户粘性强。主要威胁来自 RCL（通过 Silversea/Celebrity）和其他高端品牌向上渗透。\n\n---\n\n## 财务画像\n\n### 公司类型判断\n\n**主类型：重资产规模型。** PP&E（船队）$75.34亿，占总资产 61.6%。资本开支 ~$10亿/年。船队规模和运营效率是核心竞争壁垒。\n\n**副特征：品牌溢价。** 43.3% 毛利率和 45.8% ROIC 在重资产公司中极为罕见（通常 <15%），说明品牌定位创造了远超资产回报的经济利润。这不是靠成本领先赚钱的重资产公司，而是靠品牌溢价。\n\n**对估值的影响：** 不能纯用 PB（equity 刚转正，PB 32x 无意义）。主锚应为 EV/EBITDA（行业标准）+ FCF Yield 交叉验证。船队重置成本作为参考。\n\n### 关键指标\n\n| 指标 | FY2025 | FY2024 | FY2023 | FY2022 | 5年趋势 | 同行对比 |\n|------|--------|--------|--------|--------|---------|---------|\n| 营收 | $65.01亿 | $53.34亿 | $47.10亿 | $31.76亿 | ↑ 强劲复苏+增长 | VIK +22% vs RCL +10% vs CCL +6% |\n| 毛利率 | 43.3% | 41.6% | 39.5% | 32.2% | ↑ 连续改善 | VIK 43% vs RCL 40% vs CCL 30% |\n| 营业利润率 | 23.1% | 20.2% | 17.3% | 2.0% | ↑ 经营杠杆释放 | VIK 23% vs RCL ~24% vs CCL ~15% |\n| Adj. EBITDA 利润率 | 28.8% | 25.3% | 23.1% | — | ↑ | VIK 29% vs RCL 38% vs CCL 28% |\n| 净利率 | 17.7% | 2.9% | -39.3% | 13.1% | FY2024/2023 受 IPO 非现金费用扭曲 | VIK 18% vs RCL 24% vs CCL 12% |\n| 调整后净利 | $11.65亿 | $8.10亿 | — | — | ↑ +43.9% | — |\n| FCF | $15.33亿 | $11.65亿 | $6.97亿 | -$5.82亿 | ↑ 强劲转正 | — |\n| FCF/净利润 | 1.33x | 7.6x* | — | — | 盈利含金量高 | — |\n| OCF | $25.60亿 | $20.82亿 | $13.71亿 | $3.73亿 | ↑ | — |\n| 资本开支 | $10.27亿 | $9.17亿 | $6.74亿 | $9.55亿 | 持续高位（造船） | — |\n| Capex/D&A | 3.6x | 3.5x | 2.7x | 3.4x | >2 → 大幅扩产中 | — |\n| ROIC | 45.8% | 40.8% | — | — | ↑ | VIK 20%+ vs RCL 12% vs CCL 10% |\n| 有效税率 | 1.7% | ~9.9% | — | — | 极低（百慕大结构） | 结构性优势 |\n| 净负债率 | 1.1x | 2.4x | — | — | ↓ 快速去杠杆 | — |\n| SBC | $0.89亿 | $0.14亿 | $0.18亿 | $0.25亿 | FY2025 跳增 6x（IPO 后首年） | 占收入 1.4% |\n\n*FY2024 GAAP 净利润被 $6.26 亿非现金衍生品损失压低，导致 FCF/NI 比率失真。\n\n### 杜邦拆解（FY2025）\n- **净利率**：17.7%\n- **资产周转率**：$65.01亿 / $122.33亿 = 0.53x\n- **权益乘数**：$122.33亿 / $11.21亿 = 10.9x\n- **ROE**：254.5%（极端值，因为 equity 刚从负转正，无参考意义）\n- **ROIC 45.8%** 是更有意义的指标——说明每投入 $1 的资本能赚 $0.46\n\n### 资产质量\n- **PP&E（船队）**：$75.34亿（FY2024 $67.21亿），占总资产 61.6%。船龄年轻，折旧 $2.85亿/年\n- **商誉**：未获取具体数字（20-F 原文未完整阅读），但邮轮行业并购少，商誉风险低\n- **递延收入**：$46.05亿 → 客户已预付但未消费的航程。这是负债，但本质是未来收入的高确定性保障\n- **应收账款**：邮轮行业以预付为主，应收风险极低\n\n### 负债结构\n| 项目 | 金额 |\n|------|------|\n| 现金及等价物 | $38.04亿 |\n| 未动用循环信贷 | $10.00亿 |\n| **总流动性** | **$48.04亿** |\n| 长期债务（含当期到期） | $56.66亿 |\n| 租赁负债 | $2.39亿 |\n| **总债务+租赁** | **$59.05亿** |\n| **净债务** | **$21.01亿** |\n| Net Leverage（净债务/Adj EBITDA） | **1.1x** |\n\n- 2025年10月完成 $17亿无担保票据发行（5.875%，2033到期），偿还了全部2027年到期债务\n- 所有债券到期日推至 2028 年以后，2026年仅需偿还 $3.97亿\n- 穆迪评级：Ba3（2025年3月从B1上调）\n- 利息支出 $3.63亿/年，OCF/利息 = 7.1x → 覆盖充裕\n\n### 异常清单\n\n| 异常项 | 性质 | 追因结论 |\n|--------|------|----------|\n| SBC 从 $14M 暴增至 $89M（+530%） | 暂时性 | IPO 后首个完整年度的股权激励计划归属。占收入 1.4%，尚在合理范围，但需关注未来是否继续上升 |\n| FY2023 净亏损 $18.51亿 | 暂时性 | IPO 相关的非现金衍生品损失（Private Placement + Warrants），非经营性。调整后 EBITDA 仍为正（$10.90亿） |\n| FY2024 GAAP 净利仅 $1.53亿 vs Adj $8.10亿 | 暂时性 | 同上原因，$6.26亿非现金损失。FY2025 这些项目已消除 |\n| 股东权益从 -$52.70亿（FY2023）转正至 $11.21亿（FY2025） | 结构性好转 | IPO 募资 $17.7亿 + FY2025 留存利润 $11.48亿。但 equity base 仍很薄（仅占总资产 9.2%）|\n| 有效税率 1.7% | 结构性（但有政策风险） | 百慕大注册 + 航运收入豁免。OECD Pillar Two（2025生效）要求 15% 最低税率，但百慕大立法允许航运收入豁免。需持续关注 |\n\n---\n\n## 竞争优势\n\n### 国内可比（邮轮上市公司）\n\n| 指标 | VIK | RCL | CCL | NCLH |\n|------|-----|-----|-----|------|\n| **市值** | $367亿 | $706亿 | $361亿 | $78亿 |\n| **收入** | $65亿 | $184亿 | $270亿 | $100亿 |\n| **收入增速** | **21.9%** | 9.8% | 6.1% | ~10% |\n| **Adj EBITDA Margin** | 28.8% | **37.5%** | 27.8% | 15.9% |\n| **净利率** | 17.7% | **24.5%** | 11.5% | 5.7% |\n| **ROIC** | **20.1%** | 11.5% | 9.7% | 7.2% |\n| **PE (TTM)** | 31.9x | 15.8x | 11.5x | 14.2x |\n| **EV/EBITDA** | 21.1x | 13.3x | 8.4x | 9.2x |\n| **净负债率** | **1.1x** | ~2.5x | ~3.0x | ~5.0x |\n| **FCF** | $15.3亿 | 未获取 | $29.9亿 | **-$9.5亿** |\n| **定位** | 高端河轮+海洋 | 大众+高端+豪华 | 大众为主 | 大众+高端 |\n| **船队** | 103艘 | 68艘 | 92艘 | 32艘 |\n| **分红** | 无 | 2.28% | 2.30% | 无 |\n\n**优势领域：**\n1. **ROIC 绝对领先**：20.1% vs 同行 7-12%，资本效率是同行 2-3 倍\n2. **增速最快**：22% vs 同行个位数，且同时实现量（运力+12%）和价（净收益/PCD +7.4%）双增长\n3. **杠杆最低**：净负债率 1.1x，同行 2.5-5x。财务风险最小\n4. **入住率与同行不同口径但仍高企**：95.4%（VIK 按全铺位计算 vs 同行按双人铺位计算可>100%）\n\n**劣势领域：**\n1. **EBITDA margin 低于 RCL**：VIK 29% vs RCL 38%。RCL 的 mega-ship 模式（>5000 客）在船上消费收入上有规模优势\n2. **估值最贵**：PE 32x 是 CCL 的 2.8 倍，EV/EBITDA 21x 是 CCL 的 2.5 倍。溢价已部分反映增长优势\n3. **规模最小**：收入仅为 CCL 的 24%，面对造船厂议价权较弱\n\n### 海外对标\n\nViking 在高端邮轮市场本身就是全球标杆。更精确的对标是：\n\n- **Silversea Cruises**（RCL 旗下超豪华品牌）：VIK 的直接竞争对手，非独立上市无法对比\n- **Regent Seven Seas**（NCLH 旗下超豪华品牌）：同上\n- **Scenic Group**（澳大利亚私营河轮/探险邮轮）：VIK 在河轮领域规模远超\n\nVIK 的独特性在于：它是唯一同时运营大规模河轮（89 艘）和高端海洋邮轮（12 艘）的上市公司，且两个业务互相导流（50%+ 复购率部分来自河轮客户转化为海洋邮轮客户）。这种 **河轮-海洋生态系统** 是独一无二的竞争壁垒。\n\n### 趋势\n- VIK 的 ROIC 从 FY2024 的 40.8% 提升至 FY2025 的 45.8%——优势在扩大\n- 毛利率连续 4 年改善（32% → 39% → 42% → 43%）——定价权在增强\n- RCL 通过 Silversea 扩张高端市场，但 VIK 在河轮领域的统治地位（52% 北美市场份额）短期难以撼动\n\n### 优势脆弱性\n- 造船壁垒中等：竞争对手有资本可以订造高端船，但建立 Viking 级别的品牌认知和 50% 复购率需要 10+ 年\n- 最大威胁不是被追平，而是 **品类替代**：如果富裕退休人群的旅行偏好从邮轮转向其他形式（如高端陆地旅行、太空旅游），Viking 的客群基础会萎缩\n- RCL 的 Silversea 是最直接的海洋邮轮竞争对手，但 VIK 的河轮-海洋生态系统是 Silversea 不具备的\n\n---\n\n## 管理层\n\n### 关键人物\n\n| 姓名 | 职位 | 年龄 | 任期 | 持股 |\n|------|------|------|------|------|\n| Torstein Hagen | 创始人/董事长/CEO | 82 | 1997-至今（29年） | 53.4% 经济权益，**87% 投票权** |\n| Leah Talactac | 总裁/CFO | — | 2006-至今（20年） | 未获取 |\n| Karine Hagen | EVP Product / 董事 | — | — | 与父亲合并计算 |\n\nHagen 背景：挪威理工物理学位 → Fulbright 学者 → Harvard MBA (1968) → McKinsey 顾问（航运） → Royal Viking Line CEO (1980-84) → 1997年以4艘河轮创办 Viking → 29年打造成 $367亿 公司。\n\n### 排雷清单\n\n| 检查项 | 结果 | 来源 |\n|--------|------|------|\n| 股权质押 | 未发现质押记录 | SEC filings |\n| 增减持 | 仅 EVP Jeffrey Dash 2026年4月卖出 ~$600万（持仓 $3,370万），规模小 | Average Insider |\n| 关联交易 | 关联方应收仅 $25万（FY2024），极低。Viking Capital Ltd（开曼信托）为 Hagen 持股工具 | 20-F |\n| 负面搜索 | 2015年挪威行贿指控 → 已撤销（证据不足）。2019年被批评通过百慕大结构避税 | Cruise Law News, News in English |\n| 核心人员变动 | FY2025 Talactac 晋升为总裁+CFO，管理层稳定 | Viking IR |\n| 安全事故 | Viking Sky 2019 引擎故障（无人死亡），Viking Polaris 2022 南极航行 1 死 8 伤 | NSIA 报告 |\n\n### 治理结构\n\n**双重股权结构（高风险）：**\n- Special Shares：每股 **10 票**，仅 Hagen 家族持有\n- Hagen 通过 Viking Capital Ltd（开曼信托）持有 1.08亿普通股 + 1.28亿特殊股 = **87% 投票权**\n- NYSE \"controlled company\" 豁免：可不设独立董事多数、独立提名委员会、独立薪酬委员会\n- 百慕大注册：股东保护弱于美国法律\n\n**行为特征：**\n- **独立判断**：Hagen 在 2020 年 COVID 期间维持造船订单（同行取消），2022-2023 年行业恢复时 VIK 拥有最年轻船队和最大运力增长。这是逆周期决策的典型案例\n- **坦诚度**：FY2024 年报坦诚说明了 IPO 相关非现金损失对 GAAP 利润的影响，没有试图掩盖\n- **能力圈意识**：29 年只做邮轮一件事，没有跨界扩张。从河轮到海洋到探险是自然延伸\n- **激励结构**：Hagen 53.4% 经济权益 → 利益高度绑定。Talactac 20 年老将 → 团队稳定\n\n**核心风险：82 岁创始人无公开继任计划。** Karine Hagen（女儿）是 EVP Product + 董事，可能是潜在继任者，但没有正式 CEO 接班安排。如果 Hagen 突然无法履职，公司可能面临领导力真空。\n\n---\n\n## 致命风险（芒格：倒过来想）\n\n| # | 死亡场景 | 因果链 | 已有迹象？ | 可逆？ | 来源 |\n|---|---------|--------|-----------|--------|------|\n| 1 | **创始人失能/去世 + 治理危机** | Hagen（82岁）突然无法履职 → 87%投票权通过信托传递不透明 → 市场信心崩溃 + 管理层动荡 → 品牌受损 + 战略中断 | ⚠️ 年龄本身就是持续性风险信号。无公开继任计划 | 不可逆（品牌和治理损害短期难修复） | 第四步：管理层分析 |\n| 2 | **大流行 2.0：航线全面停运** | 新型传染病爆发 → 各国禁止邮轮靠港 → 收入归零但固定成本（船队维护、利息）持续 → 现金消耗 | ⚠️ 2025年邮轮疫情22起（同比+22%），2026年5月汉坦病毒集群事件。但 VIK 流动性 $48亿可支撑 ~2 年零收入 | 可逆（COVID 已证明行业能恢复） | 第五步：外部风险搜索 |\n| 3 | **欧洲地缘政治引爆运力危机** | 俄乌冲突扩大 / 中东局势升级 → 欧洲河流/地中海航线不可运营 → >70% 运力受影响 → 被迫取消航程、退款 | ⚠️ 已有迹象：埃及航线已暂停（~3%运力），乌克兰战争持续 | 可逆（可转移航线，但短期损失大） | 第一步+第五步 |\n| 4 | **税率结构性上升** | OECD Pillar Two 执行收紧 / 百慕大航运豁免被挑战 → 有效税率从 1.7% 升至 15% → 年净利润减少 ~$1.5亿（-13%） | ⚠️ Pillar Two 2025年已生效，百慕大立法目前允许航运豁免。但豁免条件（战略管理在百慕大）可能被质疑 | 可逆（但对估值有永久性影响） | 第二步：财务画像 |\n| 5 | **IMO 碳税 + 环保法规大幅推高成本** | IMO 碳税 $100-380/吨 CO2 → 燃料成本翻倍+ → EBITDA margin 被压缩 2-5pct → 叠加老旧船舶改造成本 | ⚠️ IMO 已批准框架，但 2025年10月因美国反对推迟至 2026年10月。EU ETS 已对欧洲航线生效 | 可逆（VIK 船队最新，合规成本低于 CCL/NCLH） | 第五步 |\n\n**⚠️ 不可逆风险已有迹象：** 场景1（创始人风险）是唯一的不可逆 + 已有迹象组合。82 岁高龄本身就是持续性迹象，且无公开应对措施。\n\n**仓位建议：** 中等仓位。不可逆风险（创始人）是真实的，但并非迫在眉睫的触发事件。多个高严重性风险存在但多数可逆。\n\n**卖出触发条件：**\n1. Hagen 健康出现任何公开报道的问题，或 Talactac/核心高管突然离职\n2. 连续两个季度 Net Yield/PCD 增速转负（定价权丧失信号）\n3. 百慕大航运税收豁免被正式挑战或取消\n\n---\n\n## 估值与安全边际\n\n### 行业估值环境\n- 邮轮行业在 COVID 后强劲复苏，估值中枢已大幅抬升（CCL 从 2020 年 EV/EBITDA 3x 恢复至 8.4x）\n- 市场对邮轮行业从\"深度价值/困境反转\"重新定价为\"增长型消费服务\"\n- VIK 作为 2024 年 IPO 新股，享有增长溢价但也面临解禁后卖压（已过）\n- 当前估值水平（VIK 21x EV/EBITDA）已经 price in 了相当程度的增长预期\n\n### 估值方法：EV/EBITDA（主锚）+ FCF Yield（验证）\n\n**为什么用 EV/EBITDA 而非 PB：** VIK 的 PB = 32x，但这是因为 equity 在 FY2025 才从负转正（$11.2亿），PB 无参考意义。邮轮行业通用 EV/EBITDA 估值，且能反映资本结构差异。\n\n**EV/EBITDA 分析：**\n- VIK 当前：21.1x（基于 TTM Adj EBITDA $18.72亿）\n- 同行：RCL 13.3x，CCL 8.4x，NCLH 9.2x\n- VIK 相对 RCL 的溢价 = 59%（21.1x / 13.3x）\n\n**溢价合理性评估：**\n| 溢价因素 | VIK vs RCL | 估计溢价贡献 |\n|---------|-----------|-------------|\n| 更高增速（22% vs 10%） | VIK 领先 | +30-40% |\n| 更高 ROIC（20% vs 12%） | VIK 领先 | +15-20% |\n| 更低杠杆（1.1x vs 2.5x） | VIK 领先 | +5-10% |\n| 更小规模（$65亿 vs $184亿） | VIK 劣势 | -5% |\n| 治理风险（双重股权、key-man） | VIK 劣势 | -10-15% |\n| **合理溢价区间** | | **+35-50%** |\n\n合理 EV/EBITDA 范围：RCL 的 13.3x × 1.35-1.50 = **18-20x**\n\n### FCF Yield 验证\n- VIK FCF $15.33亿 / 市值 $366.6亿 = **4.18%**\n- 10年期美国国债：**4.44%**\n- FCF Yield 低于无风险利率 → 市场在为增长付费\n- 如果 FCF 按 15% 增长两年：$15.33亿 × 1.15² = $20.27亿 → Forward FCF yield = 5.5% → 尚可接受\n\n### 船队重置成本（参考）\n- 海洋邮轮 ~$3.5-4亿/艘 × 12 = $42-48亿\n- 河轮 ~$2,000-2,500万/艘 × 89 = $17.8-22.3亿\n- 探险邮轮 ~$2.5亿/艘 × 2 = $5亿\n- **船队重置成本估计：$65-75亿**（推测，基于行业造船成本）\n- 当前 EV $371.7亿 = 重置成本的 **5-5.7倍** → 巨大的品牌/商业模式溢价\n\n### 场景分析\n\n| 场景 | 核心假设 | 2027E EBITDA | 对应 EV/EBITDA | 估值区间 | 隐含股价 | 假设来源 |\n|------|---------|-------------|---------------|---------|---------|---------|\n| **A：船队扩张+收益率维持高增长** | 收入 +15%/年，EBITDA margin 扩至 30%，12 艘新船按期交付 | ~$25亿 | 18-20x | $450-500亿 EV → $390-440亿 equity | **$87-99** | 第一步：Ocean +31% 趋势延续；2026预订 +13% |\n| **B：增速放缓+margin 稳定** | 收入 +10%/年，EBITDA margin 维持 29%，部分造船延迟 | ~$22亿 | 15-17x | $330-374亿 EV → $270-314亿 equity | **$61-70** | 第三步：同行增速 6-10%；造船延迟已有迹象 |\n| **C：衰退+地缘冲击+收益率压缩** | 收入持平或 -5%，入住率降至 88%，EBITDA margin 回落至 23% | ~$15亿 | 10-13x | $150-195亿 EV → $90-135亿 equity | **$20-30** | 第五步：衰退+欧洲地缘政治；FY2022 margin 曾低至个位数 |\n\n### 安全边际\n\n- **场景 C（最差合理场景）估值**：$20-30/share\n- **当前价格**：$82.24\n- **当前价格 vs 最差合理场景**：高于 **174-311%**\n- **安全边际判断：不足。**\n\n理由：当前 $82.24 接近场景 A 的下沿（$87），完全 price in 了高增长假设。即使场景 B（温和放缓）实现，也有 15-25% 下行空间。场景 C（衰退+地缘冲击）下行空间 64-76%。考虑到 82 岁创始人的不可逆 key-man risk 和 87% 投票权的治理风险，当前估值没有为意外留足余地。\n\n**但需注意：** VIK 的生意质量极高（ROIC 45.8%，50%+ 复购率，结构性人口红利）。巴菲特式逻辑：好生意本身提供安全边际——即使买贵了，时间会修复。问题在于 Hagen 的年龄让\"时间修复\"这个前提本身存疑。\n\n### 敏感性分析：EV/EBITDA × EBITDA 增速\n\n| EBITDA 增速\\EV/EBITDA | 14x | 17x | 20x | 23x |\n|----------------------|-----|-----|-----|-----|\n| 0%（$18.7亿） | $49 | $62 | $75 | $87 |\n| +10%（$20.6亿） | $55 | $69 | $84 | $98 |\n| +20%（$22.5亿） | $61 | $77 | $93 | $109 |\n| +30%（$24.3亿） | $67 | $84 | $101 | $118 |\n\n*隐含股价 = (EV - 净债务 $21亿) / 4.46亿股。假设净债务不变。\n\n当前 $82.24 大致对应 **EBITDA +10% 且 EV/EBITDA 维持 20x** 的组合，或 **EBITDA +20% 且 17x** 的组合。\n\n---\n\n## 结论\n\n**值不值得持有：** Viking 是一门优秀的生意——差异化品牌定位、行业领先的 ROIC、结构性人口红利、强劲的 FCF 增长。河轮-海洋生态系统是独特竞争壁垒，50%+ 复购率说明客户终身价值高。这是邮轮行业里最接近\"消费品牌\"的公司。\n\n**当前价格：** 安全边际不足。$82.24 已经 price in 了场景 A（高增长延续）的大部分预期。PE 32x 和 EV/EBITDA 21x 对同行溢价 100%+，即使考虑增速和 ROIC 优势，合理溢价也仅 35-50%。建议在 $58-65（场景 B 中枢）附近建仓，对应 EV/EBITDA 15-17x，可提供 20-30% 安全边际。\n\n**持有期关注点（来自死亡场景）：**\n1. **Hagen 健康和继任安排**：任何关于健康问题或管理层变动的信号需立即重新评估\n2. **Net Yield/PCD 趋势**：连续两季增速转负 = 定价权丧失 = 重新评估\n3. **税率变化**：百慕大航运豁免状态的任何监管挑战\n4. **2026年10月 IMO 会议**：碳税最终投票，若通过将影响长期成本结构\n\n**需要进一步了解：**\n- Hagen 家族信托（Viking Capital Ltd）的控制权传承安排（20-F exhibits 未完整阅读）\n- VIK 的燃料对冲策略具体条款（竞争对手公开披露但 VIK 未详细披露）\n- 印度和亚洲新市场的单位经济效益（目前仅知\"售罄\"和\"收益率与埃及相当\"）\n\n---\n\n## 数据完整度\n\n| 数据类别 | 状态 |\n|---------|------|\n| 5年财务数据 | ✅ 完整（FY2021-2025，来源：Stock Analysis、Viking IR） |\n| 同行对比 | ✅ 完整（RCL/CCL/NCLH/LIND，来源：Stock Analysis、Yahoo Finance） |\n| 管理层信息 | ✅ 基本完整（来源：SEC filings、新闻搜索） |\n| 海外对标 | ⚠️ VIK 本身是全球标杆，无独立可比上市豪华邮轮公司 |\n| 估值数据 | ✅ 完整（来源：Stock Analysis、Yahoo Finance） |\n| 年报原文 | ⚠️ 20-F 通过 earnings release + 部分 SEC filing 获取，未逐页精读全文 |\n| 燃料对冲策略 | ❌ 未获取 VIK 具体对冲安排 |\n| 家族信托条款 | ❌ 未获取 Viking Capital Ltd 控制权传承细节 |\n\n未获取数据对结论的影响：燃料对冲信息缺失不影响核心判断（燃料仅占收入 2.7%）。家族信托传承条款的缺失使创始人风险场景（场景1）的严重性评估偏保守——如果信托安排合理，key-man risk 可能被高估。建议通过阅读 20-F 完整 exhibits 或联系 IR 确认。"}}, {"id": "wuxi-apptec-603259", "name": "药明康德", "ticker": "603259.SS", "market": "A股", "sector": "医药", "confidence": "bullish", "verdict": "绝对值得持有，BIOSECURE 12月前不宜重仓", "updated": "2026-05-05", "files": {"thesis": "# 药明康德 (603259.SH / 02359.HK) 长期投资分析备忘录\n\n**分析日期**：2026-05-05\n**当前股价**：约¥93（A股，五一休市估算值，基于PE 21x推算）| 市值：约¥2,780亿\n**公司类型**：研发驱动型（商业模式本身就是研发服务，技术能力决定客户选择）\n\n---\n\n## 一句话总结\n\n全球唯一覆盖从靶点发现到商业化生产的一体化CRDMO平台，核心竞争力是规模+技术+成本的三角壁垒，但72%收入来自美国客户，BIOSECURE Act是悬在头上的达摩克利斯之剑。\n\n## 投资论点\n\n### 核心看多逻辑\n\n1. **TIDES业务爆发式增长**：寡核苷酸和多肽CDMO收入¥113.7亿，同比+96%，产能利用率逐季攀升，多肽反应釜总体积已超100,000L。GLP-1类药物需求井喷+ADC药物管线扩张是结构性驱动力，非周期性波动。来源：2025年报p14\n\n2. **\"跟随分子\"模型创造极强客户粘性**：D&M管线3,452个分子（含83个商业化、91个III期），R到D转化310个/年，商业化和III期项目全年净增22个。分子一旦进入后期阶段，客户几乎不可能换供应商。在手订单¥580亿（+28.8%），2026指引¥513-530亿。来源：2025年报p14, 巨潮搜索\n\n3. **毛利率结构性提升**：从2024年41.5%跃升至2025年47.64%（+6.16ppt），化学业务毛利率51.89%（+5.50ppt）。驱动因素是CDMO一体化模式带来的临床后期和商业化项目占比提升，属于业务结构升级而非短期因素。营业成本仅增3.64%远低于收入增15.84%。来源：2025年报p15\n\n### 关键假设\n\n这些假设如果错了，以上论点不成立：\n1. **BIOSECURE Act下WuXi不被OMB列入\"生物技术关切公司\"名单**——如被列入，美国客户法律上被禁止新签合同，72%收入的增长逻辑将被颠覆\n2. **全球创新药研发外包渗透率持续提升**——若大型药企回归自建研发（insourcing），CRDMO需求增长将放缓\n3. **TIDES产能扩张节奏与需求匹配**——如产能过剩或竞争对手快速跟进，毛利率提升将逆转\n\n---\n\n## 生意理解\n\n### 商业模式\n\n药明康德是全球医药研发服务行业（CXO）唯一真正实现\"一体化、端到端\"的CRDMO平台。客户（全球制药企业和Biotech）将药物研发的各环节外包给药明，公司\"跟随分子发展\"——从早期靶点发现（CRO）到工艺开发和商业化生产（CDMO），随着分子推进至更高阶段，单分子收入递增。\n\n核心赚钱逻辑：**降低新药研发门槛 → 吸引更多客户 → 分子进入后期阶段 → 单分子收入倍增 → 规模效应 → 利润率提升**。\n\n### 收入结构（2025年持续经营业务¥434.2亿，+21.4%）\n\n| 业务 | 收入(亿) | 占比 | YoY | 毛利率 | 核心KPI |\n|------|---------|------|-----|--------|--------|\n| 化学业务(WuXi Chemistry) | 364.66 | 84.0% | +25.5% | 51.89% | D&M管线3,452分子；TIDES收入113.7亿(+96%) |\n| 测试业务(WuXi Testing) | 40.42 | 9.3% | +4.7% | 29.26% | 药物安全评价+4.6%；新分子占比>30% |\n| 生物学业务(WuXi Biology) | 26.77 | 6.2% | +5.2% | 34.66% | 持续引流为CRDMO导入>20%新客户 |\n| 其他 | 2.36 | 0.5% | -23.8% | 85.68% | 剥离中，持续缩减 |\n\n### 地域结构（持续经营¥434.2亿）\n\n| 地区 | 收入(亿) | 占比 | YoY | 毛利率 |\n|------|---------|------|-----|--------|\n| 美国 | 312.5 | 72.0% | +34.3% | ~52% |\n| 欧洲 | 48.2 | 11.1% | -4.0% | - |\n| 中国 | 54.67 | 12.6% | -3.5% | 29.34% |\n| 其他 | 18.8 | 4.3% | +4.1% | - |\n\n**关键发现**：境外收入占87.4%，美国一国占72%。境外客户毛利率51.73%远高于境内29.34%——境内业务定价受行业价格竞争压制，而境外业务享受技术溢价+成本优势双重红利。\n\n### 客户集中度与粘性\n\n- 前五大客户销售占比48.11%，无单一客户超50%\n- 前五大供应商采购占比11.25%\n- 活跃客户约5,900家，包含全球TOP20药企中的绝大多数\n- 2025年R到D转化分子310个（药物从研究阶段推进至开发阶段），验证了\"跟随分子\"模式的持续转化能力\n\n### 产业链位置\n\n- **上游**：原材料（占成本36.21%）+人工（43.97%），无显著卡脖子风险\n- **下游**：全球制药企业，药明处于\"不可或缺但非垄断\"的位置\n- **关键优势**：深度嵌入客户的药物开发流程，更换供应商意味着重新申报、验证、延误——成本极高\n- **关键风险**：如果被政策强制切断（BIOSECURE），客户不是主动离开而是被迫离开\n\n### 市场空间\n\n- 全球医药R&D外包市场：$1,365亿(2024) → $2,395亿(2029)，CAGR 11.9%（Frost & Sullivan）\n- 外包渗透率：51.9%(2024) → 60.0%(2029)\n- 药明全球市场份额约5%（中国约20%），仍有巨大提升空间\n- 行业趋势：大药企降低研发成本+Biotech缺乏自建产能 → 外包加速\n\n---\n\n## 财务画像\n\n### 五年核心指标\n\n| 指标 | 2021 | 2022 | 2023 | 2024 | 2025 |\n|------|------|------|------|------|------|\n| 营收(亿) | 229.02 | 393.55 | 403.41 | 392.41 | 454.56 |\n| YoY | +38.5% | +71.8% | +2.5% | -2.7% | +15.8% |\n| 归母净利(亿) | 50.97 | 88.14 | 96.07 | 94.50 | 191.51 |\n| 扣非净利(亿) | 40.64 | 82.60 | 97.48 | 99.88 | 132.41 |\n| 经营现金流(亿) | 未获取 | 106.16 | 133.87 | 124.07 | 172.03 |\n| 毛利率 | ~38% | ~38% | ~41.5% | ~41.5% | 47.64% |\n| ROE(加权) | ~22% | ~26% | 18.99% | 16.78% | 28.56% |\n| 扣非ROE | ~15% | ~24% | 19.26% | 17.73% | 19.74% |\n| EPS | - | - | 3.27 | 3.28 | 6.70 |\n\n**来源**：2025年报p7（2023-2025）；每经网、腾讯新闻（2021-2022）\n\n### 公司类型判断\n\n按决策树Step 2(c)：商业模式本身就是研发服务（CRO/CDMO）→ **研发驱动型**。\n\n但药明康德是研发驱动型中的特殊类型——已稳定盈利、毛利率47.64%、连续5年盈利、ROE~20%。兼具轻资产高毛利特征（核心竞争力来自技术能力和规模效应而非固定资产），估值可辅以PE。\n\n### 盈利质量\n\n| 检查项 | 2023 | 2024 | 2025 | 判断 |\n|--------|------|------|------|------|\n| 扣非/归母 | 101.4% | 105.7% | 69.2% | 2025年非经常收益¥59.1亿（WuXi XDC处置¥52.08亿），一次性，不可持续 |\n| OCF/归母 | 139.4% | 131.3% | 89.8% | 2025 OCF/扣非=130%，经营现金流质量优秀 |\n| 营收增速 vs 利润增速 | +2.5% vs +9.1% | -2.7% vs -1.6% | +15.8% vs +32.6%(扣非) | 利润增速持续高于营收增速→经营杠杆释放 |\n\n**R&D**：研发费用¥11.19亿，占营收2.46%，全部费用化（0%资本化），极为保守。但需注意：公司的全部业务本质上就是为客户提供研发服务，这里的2.46%仅是公司自身平台技术研发投入。研发人员25,983人，占员工76.8%。\n\n### 资产负债表关键项（2025年末）\n\n| 项目 | 金额(亿) | 占总资产 | YoY变化 | 说明 |\n|------|---------|--------|--------|------|\n| 货币资金 | 351.31 | 34.07% | +91.74% | H股配售+WuXi XDC处置进账 |\n| 交易性金融资产 | 58.06 | 5.63% | +370.53% | 购买理财产品，优化资金配置 |\n| 存货 | 89.93 | 8.72% | +66.55% | 在手订单增长驱动，在产品和原材料增加 |\n| 短期借款 | 59.86 | 5.80% | +381.71% | 新增借款补充运营资金 |\n| 长期借款 | 18.19 | 1.76% | -38.53% | 优化融资结构，偿还长期债务 |\n| 净资产(归母) | 797.12 | - | +35.95% | 利润留存+H股配售 |\n| 境外资产 | 416.43 | 40.38% | - | 全球化布局深入 |\n\n**资产负债率**：约22.7%（1-797.12/1031.21），极低杠杆。货币资金¥351.31亿远超有息负债¥78.05亿（短借59.86+长借18.19），净现金状态。\n\n### 现金流\n\n| 项目 | 2023 | 2024 | 2025 |\n|------|------|------|------|\n| 经营现金流(亿) | 133.87 | 124.07 | 172.03 |\n| 投资现金流(亿) | - | -55.18 | -19.45 |\n| 筹资现金流(亿) | - | -38.32 | +11.24 |\n\n2025年投资现金流出大幅减少，因WuXi XDC处置带来的显著现金流入。筹资现金流转正，因H股配售73.8万股（HK$104.27/股）和2024年利润分配/特别分红/回报股东分红的对冲。\n\n### 异常清单\n\n| 异常项 | 性质 | 追因结论 |\n|--------|------|----------|\n| 2025归母净利翻倍（+102.65%） | 暂时性 | 主因WuXi XDC Cayman处置收益¥52.08亿（非经常），扣非仅+32.56% |\n| 毛利率一年跃升6.16ppt | 结构性 | CRDMO一体化模式下商业化和临床后期项目占比提升+TIDES放量，可持续 |\n| 存货暴增66.55% | 待确认 | 对应在手订单+28.8%（¥580亿），如果订单执行正常则合理；需跟踪Q1 2026存货消化 |\n| 投资收益飙升1321% | 暂时性 | WuXi XDC处置+剥离部分业务，2026年不会重现 |\n\n---\n\n## 竞争优势\n\n### 国内可比（2024年数据基准）\n\n| 指标 | 药明康德 | 康龙化成(300759) | 泰格医药(300347) | 凯莱英(002821) |\n|------|--------|----------------|----------------|--------------|\n| 定位 | CRDMO全链 | CRO+CDMO | 临床CRO | 小分子CDMO |\n| 营收(亿) | 392.41 | 122.76 | 66.03 | 58.05 |\n| 营收增速 | -2.7% | +6.4% | -10.6% | -25.8% |\n| 净利润(亿) | 94.50 | 17.93 | 4.05 | 9.49 |\n| 毛利率 | 41.5% | 34.24% | 33.27% | 42.36% |\n| 净利率 | 24.1% | 13.96% | 6.1% | 16.3% |\n| ROE | 16.78% | 13.7% | ~3% | 5.6% |\n\n**2025年差距进一步拉大**：药明化学业务单项收入¥364.66亿已超三家对手合计¥246.84亿（2024年），且毛利率51.89%远超同行。TIDES¥113.7亿是全行业增速最快的细分赛道。\n\n**优势来源**：\n- **规模壁垒**：D&M管线3,452个分子，竞争对手均不超过500个。规模带来经营杠杆和成本分摊优势\n- **一体化壁垒**：唯一能提供\"概念产生→商业化生产\"全流程的平台，客户锁定效应极强\n- **产能壁垒**：小分子API反应釜>4,000kL，多肽合成>100,000L，均通过FDA零缺陷检查，竞争对手需数年才能追赶产能\n- **人才壁垒**：25,983名研发人员（含1,236名博士），国内同行业无可比的人才密度\n\n### 海外对标\n\n| 指标 | 药明康德 | Charles River | Lonza | Samsung Bio | IQVIA |\n|------|--------|---------------|-------|-------------|-------|\n| 定位 | 全链CRDMO | 临床前CRO | CDMO | 大分子CDMO | CRO |\n| 2025营收 | ~$63亿 | $40.2亿 | ~$73亿 | ~$33亿 | $163.1亿 |\n| 毛利率 | 47.64% | ~34.6% | ~36% | ~39% | ~33.8% |\n| 核心利润率 | ~29%(扣非) | ~12.7% | EBITDA 31.6% | ~39.1% | ~8.1% |\n| PE(TTM) | ~21x | ~15x(Non-GAAP) | ~52x(Core) | ~61x | ~30x |\n\n**来源**：BusinessWire(CRL), Lonza.com(LONN), SamsungBiologics.com, IQVIA IR\n\n**发展阶段定位**：药明康德在收入规模上已达到全球第三（仅次于IQVIA和Lonza），但在小分子和TIDES领域的CDMO能力可能已是全球第一。从盈利能力看，47.64%的毛利率领先所有可比公司，反映出成本优势+技术溢价的双重壁垒。\n\n**估值折价**：药明PE 21x显著低于Lonza 52x和Samsung Bio 61x，也低于IQVIA 30x。折价主要源于BIOSECURE Act的政治风险溢价。如果这一风险解除（OMB不点名），估值修复空间巨大。\n\n### 优势脆弱性\n\n- **钱能砸平吗？** 不完全能。产能可以砸（三星、Lonza在扩产），但3,452个分子的管线和42万化合物交付经验无法复制\n- **跨界威胁？** AI制药可能改变早期CRO格局，但CDMO（生产制造）不受AI替代影响\n- **何时消失？** 如果BIOSECURE Act强制切断美国客户，3-5年内竞争对手可能填补空白；如果没被切断，5年内差距大概率继续扩大\n\n---\n\n## 管理层\n\n### 关键人物\n\n| 姓名 | 职位 | 国籍 | 关键背景 |\n|------|------|------|----------|\n| 李革(Ge Li) | 董事长兼联席CEO | 美国 | 北大化学系→哥伦比亚大学博士，2000年创办药明康德。2025年年薪¥3,998万 |\n| 陈民章 | 联席CEO | - | 20+年新药研发和生产管理经验 |\n| 杨青 | 联席CEO | - | 复旦→密歇根理工→UCSF博士。前阿斯利康/辉瑞亚洲研发VP |\n| 胡正国 | CFO兼首席投资官 | - | 2010年加入药明集团，2014年起任CFO |\n| 赵宁 | 联合创始人 | - | **2023年5月去世**（癌症）。生前为实控人之一 |\n\n### 实控人架构\n\n无控股股东。Ge Li(李革)、张朝晖、刘晓钟通过一致行动协议共同控制16.6972%表决权。刘晓钟已辞去董事职务，不再担任任何职位。2025年10月，Fertile Harvest等三方解除一致行动协议。\n\n控制链：李革 → G&C VI/V/IV/VII Limited（BVI/开曼实体）+ 嘉兴宇祥等境内LP → 合计16.70%表决权。结构复杂，涉及多层离岸实体。\n\n### 排雷清单\n\n| 检查项 | 结果 | 来源 |\n|--------|------|------|\n| 股权质押 | **无** — 前十大股东均无质押 | 2025年报p74 |\n| 增减持 | **🔴重大减持** — 累计减持>¥1,000亿（药明系整体）。2023年李革单年套现>¥100亿。2025年10月-2026年1月继续减持¥100亿+ | 新浪财经 |\n| 关联交易 | **🟡存在** — 药明系四家上市公司（药明康德/药明生物/药明合联/药明巨诺）之间存在持续关联交易。2025年减持药明合联套现约46亿港元 | 年报+新浪财经 |\n| 负面搜索 | **🔴FBI IP泄露指控** — 美国情报官员向参议员秘密简报，指控药明向北京转移客户数据。药明否认，至今无公开实锤。741次质量审计0重大发现提供反面证据 | Reuters/BioSpace |\n| 核心人员变动 | **🟡关注** — 赵宁2023年去世；刘晓钟辞去董事；Fertile Harvest等解除一致行动 | 年报/澎湃新闻 |\n| 审计 | 德勤华永，标准无保留意见 | 2025年报p2 |\n| 回购 | 2025年两次回购共注销2,763万股A股（¥20亿），传递看好信号；但与大股东同期减持形成矛盾 | 2025年报p79-80 |\n\n### 行为特征分析\n\n**独立判断力**：李革在BIOSECURE Act压力下主动出售美国/英国CTDMO业务（2024年12月）和部分子公司（2025年10月），显示战略灵活性——不等被动被制裁，而是主动\"瘦身\"降低地缘暴露。\n\n**坦诚度**：管理层在年报中对10类风险做了详尽披露（p30-32），包括地缘政治、汇率、合规等，信息披露质量高于多数A股公司。但大股东减持行为与\"看好公司前景\"的表态形成明显矛盾。\n\n**资本配置**：分拆上市→高位套现的\"炼金术\"模式（药明生物、药明合联），虽然合法但不利于少数股东利益。2025年现金回报¥87.55亿（占净利45.72%），客观上股东回报力度不低。\n\n**核心风险信号**：大股东持续、大规模减持是最显著的负面信号。即使有\"财务规划\"等合理解释，年均减持超百亿的力度在A股极为罕见，市场信号解读为\"内部人在降低暴露\"。\n\n---\n\n## 致命风险（芒格：倒过来想）\n\n| # | 死亡场景 | 因果链 | 已有迹象？ | 可逆？ | 来源 |\n|---|---------|--------|-----------|--------|------|\n| 1 | OMB将药明列入\"生物技术关切公司\"名单 | BIOSECURE Act成法(2025.12)→OMB发布名单(预计2026.12前)→美国联邦合同方被禁合作→新签合同断流→存量合同8年过渡期内逐步转移 | **是** — 法案已成法，国会持续施压，五角大楼曾短暂列入1260H名单后撤回 | 半不可逆（列入后需漫长法律程序移除） | Step 4搜索 |\n| 2 | 美国客户主动去中国化 | 地缘风险意识→客户dual-sourcing→新项目不再给药明→收入增速放缓→市场估值压缩 | **部分** — 部分客户已启动备选供应商评估；但2025美国收入+34.3%说明尚未大规模发生 | 可逆（取决于药明海外产能建设速度） | Step 1地域分析 |\n| 3 | IP泄露指控被实锤 | FBI指控被公开实锤→全球客户信任崩塌→项目大规模撤离→收入断崖 | **未实锤** — FBI秘密简报内容未公开，药明否认；741次审计0重大发现是反面证据 | 不可逆（信任崩塌无法重建） | Step 4搜索 |\n| 4 | 全球Biotech融资持续寒冬 | 利率高企→融资困难→Biotech削减外包→药明小客户流失→增速下滑 | **已好转** — 在手订单¥580亿(+28.8%)，Q1 2026收入+28.81% | 可逆（周期性） | Step 1市场分析 |\n| 5 | 大股东减持引发市场信心螺旋 | 持续减持→市场解读为\"内部人不看好\"→股价下跌→更多减持→恶性循环 | **是** — 2023年以来持续减持>¥1,000亿 | 可逆（减持终有尽头，目前持股16.70%） | Step 4管理层 |\n\n⚠️ **不可逆风险已有迹象**：场景1（BIOSECURE Act）已实质性推进——法案已签署成法，虽未直接点名但OMB名单悬而未决。这是本分析中最关键的风险变量。\n\n### 投资行动指引\n\n- **仓位建议**：**轻仓至中等仓位**。核心风险（BIOSECURE Act OMB名单）将于2026年12月前明朗化。在OMB名单公布前，不宜重仓；一旦确认未被点名，可大幅加仓\n- **卖出触发条件**：\n  1. OMB正式将药明康德列入\"生物技术关切公司\"名单\n  2. 主要美国客户（TOP5）公开宣布终止合作或大规模转移项目\n  3. IP泄露指控出现实质性法律进展（如DOJ调查、客户诉讼）\n- **估值方法建议**：PS（主锚）+ PE（辅助，因已稳定盈利）+ 海外对标PE折价法\n\n---\n\n## 估值与安全边际\n\n### 行业估值环境\n\n- CXO行业在2023-2024年经历估值大幅压缩（BIOSECURE+融资寒冬），2025年H2开始回暖\n- 全球同业估值分化：Samsung Bio 61x、Lonza 52x（大分子CDMO享高估值）；CRL 15x、IQVIA 30x\n- A股CXO板块机构持仓从2023年高点大幅下降，拥挤度已解除\n- 药明当前PE ~21x处于5年~10%分位，显著低于历史中枢35-40x\n- 估值压制因素：BIOSECURE Act（政治风险溢价）+ 大股东减持\n- 无风险利率1.744%（10年期国债），处于历史低位，理论上支撑成长股估值\n\n### 估值方法与计算\n\n**方法1：PE（辅助锚点）**\n\n| 基准 | PE区间 | 隐含市值(亿) | 隐含股价 | 依据 |\n|------|--------|------------|--------|------|\n| 2025扣非NP ¥132.4亿 | 21x（当前） | 2,780 | ~¥93 | 当前交易水平 |\n| 2026E扣非NP ¥159亿（+20%） | 20-25x | 3,180-3,975 | ¥107-133 | 管理层指引18-22%增长，PE小幅修复 |\n| 2026E扣非NP ¥159亿 | 30x（全球同业均值） | 4,770 | ¥160 | 假设BIOSECURE风险解除后估值回归 |\n\n注：PE 21x处于近5年约10%分位。若基本面持续改善（2025年已验证），历史低分位可能低估合理估值。\n\n**方法2：PS**\n\n- 2025持续经营收入¥434.2亿，当前市值¥2,780亿 → PS 6.4x\n- 2026E收入¥513-530亿 → 前向PS 5.2-5.4x\n- Lonza PS ~7x，Samsung Bio PS ~15x，IQVIA PS ~3.5x\n- 药明PS 5-6x在全球同业中居中偏低水平\n\n**方法3：FCF Yield**\n\n- 2025 OCF ¥172亿，估算FCF ~¥110-120亿（扣除资本开支约¥50-60亿，推测值）\n- FCF Yield = ¥115亿/¥2,780亿 = 4.14%\n- vs 无风险利率1.744%：溢价2.40个百分点\n- 对于一个增长20%+的业务，4.14%的FCF收益率提供了一定安全垫\n\n### 场景分析\n\n| 场景 | 核心假设 | 2026E扣非NP(亿) | PE | 对应估值(亿) | 对应股价 | 假设来源 |\n|------|---------|---------------|-----|-----------|--------|--------|\n| A: TIDES爆发+估值修复 | TIDES+50%，整体收入¥530亿，毛利率维持48%+，OMB未点名 | 170 | 25-30x | 4,250-5,100 | ¥142-171 | Step1:TIDES+96%趋势；Step5:法案未点名假设 |\n| B: 主业稳增+估值温和修复 | 整体收入¥513亿，增速回归18%，OMB未点名但不确定性持续 | 155 | 20-22x | 3,100-3,410 | ¥104-114 | 管理层指引下限；Step5:政治风险持续压制 |\n| C: OMB点名+客户部分转移 | 列入关切名单，新项目断流，存量8年过渡；收入降至¥430亿(2027E) | 100(2027E) | 13-15x | 1,300-1,500 | ¥44-50 | Step5:场景1因果链；8年过渡期缓冲 |\n\n### PE敏感性分析（基于2026E扣非NP）\n\n| 扣非NP\\PE | 15x | 18x | 21x | 25x | 30x |\n|----------|-----|-----|-----|-----|-----|\n| ¥140亿 | ¥70 | ¥84 | ¥99 | ¥117 | ¥141 |\n| ¥155亿 | ¥78 | ¥93 | ¥109 | ¥130 | ¥156 |\n| ¥170亿 | ¥85 | ¥103 | ¥120 | ¥142 | ¥171 |\n\n### 安全边际\n\n- **最差合理场景估值**：¥44-50（场景C：OMB点名+客户转移）\n- **当前价格**：约¥93\n- **当前价格 vs 最差合理场景**：高出86%-111%\n- **安全边际判断**：**不足**\n\n理由：当前¥93的价格隐含了\"OMB不点名\"的核心假设（对应场景A/B的¥104-171）。如果这个假设被证伪（场景C），下行空间可达50%+。对于一个不可逆的政治风险，50%+的潜在跌幅说明当前价格没有为最差合理情况留出安全垫。\n\n但需强调：场景C的概率并非100%。最终法案版本已删除具体公司名称，五角大楼1260H名单列入后又撤回，均暗示将药明\"定罪\"的政治共识可能不够强。如果赋予场景C约25-30%的概率，场景A/B合计70-75%概率，则概率加权估值约¥100-120——当前¥93略有折价。\n\n---\n\n## 结论\n\n**值不值得持有**：药明康德是全球CXO行业最优质的标的之一，\"一体化CRDMO+跟随分子\"模式创造了极强的竞争壁垒和利润增长潜力。TIDES业务爆发（+96%）和毛利率跃升（47.64%）验证了商业模式的飞轮效应。**从生意质量看，绝对值得持有。**\n\n**当前价格**：PE ~21x处于5年10%分位，相对全球同业（30-60x）有显著折价。折价的核心原因是BIOSECURE Act政治风险。**如果这一风险在2026年12月解除（OMB不点名），估值修复空间达50-80%。** 但如果被点名，下行风险50%+。\n\n**安全边际判断**：**不足。** 当前价格充分定价了\"不被点名\"的假设，但对\"被点名\"场景没有安全垫。这是一个\"赌政治结果\"的定价位置。\n\n**持有期关注点**（直接来自死亡场景的卖出触发）：\n1. **2026年12月前**：OMB \"生物技术关切公司\"名单公布——最关键的单一事件\n2. 美国TOP5客户是否公开调整供应链策略\n3. 在手订单增速变化（当前+28.8%，若降至<10%则需警惕客户转移）\n4. 大股东减持节奏（若加速减持，叠加利空可能形成Lollapalooza效应）\n\n**需要进一步了解**：\n1. 2021年经营现金流数据（5年完整序列缺失一年）\n2. 详细资本开支数据（年报财务报表附注中有，本次未读到该页）以精确计算FCF\n3. 2026 Q1详细业务拆解（确认TIDES增速是否可持续）\n4. OMB名单编制进展的最新消息（2026年下半年持续跟踪）\n\n---\n\n## 数据完整度\n\n| 数据类别 | 状态 |\n|---------|------|\n| 5年财务数据 | ⚠️ 2023-2025完整（年报原文），2021-2022来自二手源，缺2021年OCF |\n| 同行对比 | ✅ 4家国内同行（康龙化成/泰格/凯莱英/药明生物）2024年报数据获取 |\n| 管理层信息 | ✅ 5位关键人物搜索完成，重大减持/关联交易/BIOSECURE风险充分覆盖 |\n| 海外对标 | ✅ 4家全球龙头（CRL/Lonza/Samsung Bio/IQVIA）2025年报数据获取 |\n| 估值数据 | ⚠️ 当前股价为五一休市期间估算值（~¥93），非实时数据 |\n\n未获取数据对结论的影响：\n- 缺少精确资本开支数据使FCF估算有¥10-20亿误差范围，但不改变\"FCF健康\"的定性判断\n- 股价为估算值，待节后确认实际交易价格，可能影响安全边际的定量判断（但\"不足\"的定性判断不受影响）\n- 2021年OCF缺失不影响趋势判断（2022-2025四年数据已足够）"}}, {"id": "xiaomi-01810", "name": "小米集团", "ticker": "01810.HK", "market": "港股", "sector": "科技硬件", "confidence": "wait", "verdict": "生态有吸引力但护城河脆弱", "updated": "2026-05-06", "files": {"thesis": "# 小米集团 (01810.HK) 长期投资分析备忘录\n\n**分析日期**：2026-05-05\n**当前股价**：HK$31.9 | 市值：~8,000亿港元（~7,340亿人民币）\n**公司类型**：轻资产生态型（手机+IoT+互联网）+ 重资产规模型（汽车，扩张期）→ 触发 SOTP 估值\n\n---\n\n## 一句话总结\n\n小米是一家以智能手机为流量入口、IoT 生态为粘性基座、互联网服务为利润引擎的轻资产生态公司，正在用品牌势能和用户基盘强行切入重资产 EV 赛道，汽车业务上市 19 个月即交付 50 万辆，但安全事故和品牌反噬风险正在积累。\n\n## 投资论点\n\n### 核心看多逻辑\n1. **生态飞轮加速**：HyperOS 连接超 9 亿设备，手机→IoT→汽车的交叉销售使单用户价值持续提升。互联网服务毛利率 76.5% 为整体利润提供杠杆，FY2025 整体净利率从 6.5% 跳升至 9.1%（来源：FY2025 年报）\n2. **汽车业务实现「从 0 到 1」的跨越**：FY2025 交付 41.2 万辆（+201%），汽车经营利润 9 亿元首次年度转正，上市仅 19 个月达 50 万辆累计交付。2026 目标 55 万辆，截至 4 月已累计超 65.5 万辆（来源：公司公告、国科网）\n3. **估值处于历史低位**：PE(TTM) 约 18-22x，处于近 5 年约 20% 分位，相比 10 年中位数 25.4x 有 30% 折价。净现金 1,965 亿元（每股约 HK$8.5）提供显著下行保护（来源：GuruFocus、年报）\n\n### 关键假设\n这些假设如果错了，以上论点不成立：\n1. 汽车业务不再发生重大安全事故导致品牌系统性崩塌\n2. 美国不将小米列入实体清单或实施芯片级制裁\n3. 智能手机市场不出现结构性萎缩（ASP 提升和 AI 手机需求能对冲出货量下滑）\n\n---\n\n## 生意理解（第一步）\n\n### 收入结构（FY2025）\n\n| 业务板块 | 收入（亿元） | 占比 | 同比 | FY2025 毛利率 | FY2024 毛利率 | 角色 |\n|---------|------------|------|------|-------------|-------------|------|\n| 智能手机 | 1,864 | 40.8% | -2.8% | **10.9%** | 12.6% | 流量入口 |\n| IoT 与生活消费 | 1,232 | 26.9% | +18.3% | 23.1% | 20.3% | 生态粘性 |\n| 互联网服务 | 374 | 8.2% | +9.7% | 76.5% | 76.6% | 利润引擎 |\n| 汽车+AI创新 | 1,061 | 23.2% | +223.8% | **24.3%** | 18.5% | 第二增长曲线 |\n| **合计** | **4,573** | **100%** | **+25.0%** | **22.3%** | 20.9% | |\n\n**地区收入**：中国大陆 3,062 亿（67.0%）| 海外 1,511 亿（33.0%）\n**客户集中度**：前五大客户占 13.1%，最大单一客户占 8.5%——集中度低，健康\n\n### 赚钱机制\n\n小米的商业模式是**硬件获客、软件变现**：\n- 手机以接近成本价销售（FY2025 毛利率仅 10.9%，同比下降 1.7pct），获取用户进入小米生态\n- IoT 设备（电视、空调、扫地机器人等）围绕手机用户构建智能家居场景，提升用户粘性\n- 互联网服务（广告、游戏、金融科技）对已有用户基盘进行高毛利变现\n- 汽车业务利用品牌势能和「人车家全生态」切入高 ASP 品类\n\n关键特征：\n- **经营杠杆**：互联网服务几乎零边际成本，用户基盘每扩大 10%，互联网利润可能扩大 15-20%\n- **制造外包**：手机和 IoT 大部分采用 OEM/ODM 模式，固定资产占比低\n- **汽车重资产**：自建工厂（北京亦庄两期），汽车 CapEx FY2025 达 120 亿（集团总 CapEx 182 亿的 66%）\n\n### 关键运营 KPI（FY2025 年报）\n\n| 指标 | FY2025 | 同比 |\n|------|--------|------|\n| 手机出货量 | 1.652 亿台 | -2.0% |\n| 手机 ASP | ¥1,128.7 | -0.8% |\n| 全球手机市占率 | 13.3%（第三） | 稳定 |\n| 中国手机市占率 | 16.6%（第二） | — |\n| IoT 连接设备数 | **10.79 亿台** | +19.3% |\n| 全球 MAU | 7.541 亿 | +7.4% |\n| 中国 MAU | 1.904 亿 | +10.1% |\n| 小爱同学 MAU | 1.599 亿 | +16.7% |\n| 汽车交付量 | 41.1 万辆 | +200.4% |\n| 汽车 ASP | ¥251,171 | +7.1% |\n| 广告收入 | 285 亿 | +15.2% |\n| 中国门店 | ~18,000 家 | 净增 3,000+ |\n| EV 销售中心 | 477 家/138 城 | — |\n\n### 产业链位置\n\n- **上游**：高通/联发科（SoC）、三星/SK 海力士（存储）、京东方（屏幕）。芯片依赖度高，自研芯片（澎湃系列）仍在早期。供应商集中度：前五大占采购 30.9%，最大单一供应商 12.1%\n- **下游**：全球消费者，通过线上（小米商城/第三方电商）和线下（~18,000 家门店）销售\n- **议价权**：作为全球第三大手机品牌，对供应链有一定议价权，但不如 Apple/Samsung\n\n### 市场空间\n\n| 市场 | 规模 | 增速 | 小米位置 |\n|------|------|------|---------|\n| 全球智能手机 | ~$6,089 亿（2025） | 2025: +2%, 2026E: -0.9% | 全球第三，13.1% 份额 |\n| 中国智能家居 | $310-370 亿（2025） | CAGR 15.8% | 生态链领先者 |\n| 中国新能源汽车 | 2025 年渗透率超 60% | 高速增长 | 新势力第三梯队，快速上升 |\n\n### 商业模式可持续性\n\n一句话：**生态越大，护城河越深，但每个单点都没有绝对壁垒。**\n\n5 年内的颠覆风险：AI 原生设备（如 AI Pin、AR 眼镜）如果替代手机成为主要入口，小米的整个生态逻辑需要重建。但短期内手机仍是核心入口的概率极高。\n\n---\n\n## 财务画像（第二步）\n\n### 五年财务概览\n\n| 指标 | FY2021 | FY2022 | FY2023 | FY2024 | FY2025 |\n|------|--------|--------|--------|--------|--------|\n| 营收（亿元） | 3,283 | 2,800 | 2,710 | 3,659 | 4,573 |\n| 营收增速 | +33.5% | -14.7% | -3.2% | +35.0% | +25.0% |\n| 经调整净利润 | 220 | 85 | 193 | 272 | 392 |\n| GAAP 净利润 | 193 | 25 | 175 | 237 | 416 |\n| 整体毛利率 | 17.7% | 17.0% | 21.2% | 20.9% | 22.3% |\n| GAAP 净利率 | 5.9% | 0.9% | 6.5% | 6.5% | 9.1% |\n| ROE | 14.75% | 1.78% | 11.34% | 13.34% | 18.25% |\n| 经营现金流 | -44 | 413 | 393 | 341 | 341 |\n| CapEx | 58 | 63 | 73 | 128 | 182 |\n| FCF | -104 | 339 | 351 | 162 | 160 |\n| 研发费用 | 132 | 160 | 191 | 241 | 331 |\n| 研发/营收 | 4.0% | 5.7% | 7.0% | 6.6% | 7.2% |\n| D/E Ratio | — | 0.18 | 0.18 | 0.19 | 0.16 |\n\n### 公司类型判断\n\n按决策树逐步：\n1. 金融机构？否 →\n2. R&D 决定命运？R&D 7.2%（<15%），停止研发现有产品仍可赚 3-5 年。否 →\n3. 利润由外部价格驱动？否 →\n4. 现金奶牛？无分红，增长>10%。否 →\n5. 固定资产>30%？手机/IoT 制造外包，总资产 5,081 亿中现金 2,326 亿占 46%，固定资产占比推测 <20%。否 →\n6. 轻资产、品牌/生态驱动、已盈利？**是，但整体毛利率 22.3% 低于典型 35% 标准**\n\n**结论**：小米不完全适配任何单一类型。主分类为**轻资产生态型**——商业模式轻资产（OEM/ODM），竞争力来自品牌和生态而非产能规模，整体毛利率偏低但互联网服务（76.5%）提供利润杠杆。副分类为**重资产规模型**（汽车业务，处于扩张期）。\n\n**SOTP 触发**：汽车+AI 占营收 23.2%（>20%），与传统业务属不同行业，需分部估值。\n\n### 盈利质量\n\n- **GAAP vs 调整后净利润差异**：FY2025 GAAP 416 亿 vs 调整 392 亿，差异来自公允价值变动收益 133 亿（FY2024 仅 10.5 亿），投资组合估值上升贡献巨大——**非经营性、不可持续**\n- **SBC 费用**：FY2025 达 53.65 亿（+44.2%），16,572 名员工持有股权激励，员工总薪酬 305 亿\n- **OCF/净利润**：FY2023-2025 约 0.82-2.25x，盈利含金量尚可\n- **FCF 下降趋势**：FY2022-2023 的 339-351 亿降至 FY2024-2025 的 160-162 亿，原因是汽车 CapEx FY2025 达 120 亿（集团总 182 亿的 66%）——结构性但属战略性投入\n- **实际税率**：16.3%（名义 25%，部分子公司享高新技术 15% 优惠）\n- **硬件净利率承诺**：FY2025 硬件业务整体净利率 2.3%，继续履行「硬件综合净利率不超 5%」承诺\n\n### 资产质量\n\n- **净现金 1,965 亿元**：极其充裕，有息负债仅 361 亿（含 US$6 亿 3.375% 高级债 2030 到期、US$8.55 亿零息可转债 2027 到期转股价 HK$36.74、US$8 亿 2.875% 债 2031 到期），财务安全度极高\n- **2025 年配股融资**：3 月完成 8 亿股 B 类配售，每股 HK$53.25，净募资 ~HK$425 亿\n- **股份回购**：累计回购 3.39 亿股，总金额 HK$127 亿，2026 年 1 月启动自动回购计划（上限 HK$25 亿）\n- **Current Ratio 1.32**：FY2024 起下降（此前 1.72-1.79），与汽车业务扩张及配股融资节奏有关\n- **投资组合**：约 410 家企业，账面价值 871 亿，公允价值 890 亿\n- **VIE 结构**：合并关联实体收入 1,104 亿（占 24.1%），资产 1,295 亿（占 25.5%），用于需国内牌照的业务\n- **商誉**：小米以内生增长和生态链投资为主，大额商誉风险较低\n\n### 异常清单\n\n| 异常项 | 性质 | 追因结论 |\n|--------|------|----------|\n| FY2021 经营现金流为负（-44亿） | 暂时性 | 金融科技业务运营资金占用所致，FY2022 恢复正常 |\n| FY2022 GAAP 净利仅 25 亿（调整后 85 亿） | 暂时性 | 投资组合公允价值损失，非经营性 |\n| FCF 连续两年下降至 160 亿 | 结构性（战略性） | 汽车工厂 CapEx 大幅增加，属主动投资 |\n| ROE 从 1.78%（FY2022）飙升至 18.25%（FY2025） | 趋势性改善 | 利润率提升+资产周转改善双驱动 |\n| 研发费用增速（+37.8%）显著高于营收增速（+25%） | 结构性 | 汽车+AI 大模型研发投入，雷军承诺未来 5 年投 2000 亿。R&D 人员 25,457 人占员工总数 56,531 人的 45% |\n| 手机毛利率从 12.6% 降至 10.9% | 需关注 | 国补减少+零部件涨价+竞争加剧。手机出货量同比 -2%，ASP -0.8%，量价齐跌 |\n| 公允价值变动收益从 10.5 亿暴增至 133 亿 | 暂时性 | 投资组合（410 家企业）估值上升，GAAP 利润被一次性收益膨胀约 25% |\n| 汽车毛利率从 18.5% 飙升至 24.3% | 正面趋势 | SU7 Ultra 和 YU7 高端化拉动，规模效应释放 |\n\n---\n\n## 竞争优势（第三步）\n\n### 国内可比（手机+IoT 维度）\n\n| 指标 | 小米 | 传音控股 | 美的集团 | 海尔智家 |\n|------|------|---------|---------|---------|\n| FY2025 营收（亿元） | 4,573 | 656 | 4,585 | 3,023 |\n| 毛利率 | 22.3% | 19.2% | 26.4% | 26.7% |\n| 净利率 | 9.1% | 4.0% | 9.75% | ~7% |\n| ROE | 18.25% | 未获取 | 17.8% | ~17.7% |\n| PE (TTM) | ~20x | ~15x | ~13.3x | ~10.7x |\n\n**差值分析**：\n- 小米毛利率（22.3%）低于美的/海尔（26-27%），但净利率（9.1%）接近美的（9.75%），因为互联网服务的高边际利润率拉高了整体\n- 小米 PE 显著高于家电龙头（20x vs 10-13x），反映市场对汽车业务增长的溢价\n- 小米 ROE（18.25%）略高于美的/海尔，且处于上升趋势\n\n### 国内可比（汽车维度）\n\n| 指标 | 小米汽车 | 比亚迪 | 理想 | 蔚来 |\n|------|---------|-------|------|------|\n| FY2025 汽车收入（亿元） | 1,033 | ~8,040 | ~1,123 | ~875 |\n| 交付量（万辆） | 41.1 | 460 | 40.6 | 32.6 |\n| 汽车毛利率 | **24.3%** | 20.5% | ~20% | 14.6% |\n| 汽车 ASP（万元） | 25.1 | ~17.5 | ~27.7 | ~26.8 |\n| 全年盈利 | 经营利润 9 亿 | 326 亿 | 11.4 亿 | 亏损 149 亿 |\n\n**差值分析**：\n- 小米汽车交付量（41.1 万）已超理想（40.6 万），仅用 2 年时间走完理想 5 年的路\n- **汽车毛利率 24.3% 已超过比亚迪（20.5%）和理想（~20%）**，在新势力中最高。这得益于 SU7 Ultra/YU7 高端化策略和规模效应释放\n- 汽车 ASP 25.1 万元，定位中高端，高于比亚迪但低于理想/蔚来\n- 但比亚迪的规模优势（460 万辆 vs 41 万辆）是量级差距，供应链成本、产能利用率完全不在同一层次\n\n### 海外对标\n\n**vs Apple（生态型标杆）**：\n\n| 指标 | 小米 | Apple |\n|------|------|-------|\n| 营收 | 4,573 亿元 | $4,162 亿 |\n| 毛利率 | 22.3% | 46.9% |\n| 净利率 | 9.1% | 26.9% |\n| ROE | 18.25% | 171%* |\n| PE | ~20x | 33.9x |\n\n*Apple ROE 极高因大量回购压缩股东权益，不可直接对比\n\n小米相当于 Apple 的**低毛利版本**——同样的生态逻辑，但缺乏 Apple 级别的品牌溢价和服务收入占比。Apple Services 毛利率>70% 且占营收 25%+，小米互联网服务毛利率 76.5% 但仅占 8.2%。\n\n**发展阶段定位**：小米在手机生态方面落后 Apple 约 8-10 年（服务收入占比和品牌溢价的差距）。但小米在 IoT 设备互联数量上领先，且正在走一条 Apple 没走的路（汽车）。\n\n### 优势趋势\n\n- **在扩大的优势**：IoT 生态设备连接数持续增长，汽车交付量高速增长\n- **在缩小的优势**：手机市场份额面临 Apple 和华为的挤压（华为回归后中国市场竞争加剧）\n- **脆弱性**：小米的每个单点业务都有比它做得更好的对手（Apple 做手机、美的做家电、比亚迪做车），小米的壁垒在于生态整合能力——如果生态协同不能转化为用户可感知的价值，各业务线可能被各自领域的专精对手逐个击破\n\n---\n\n## 管理层（第四步）\n\n### 关键人物\n\n| 人物 | 职务 | 持股 | 备注 |\n|------|------|------|------|\n| 雷军 | 创始人/董事长/CEO | 23.26%（64.1% 投票权） | 小米灵魂人物，亲自下场造车 |\n| 卢伟冰 | 集团总裁 | 未获取 | 2019 加入，2022 升总裁，清华本科+长江 EMBA |\n| 林斌 | 联合创始人/副董事长 | 8.56% | 2026.12 起启动 4 年 20 亿美元减持计划 |\n\n### 排雷清单\n\n| 检查项 | 结果 | 来源 |\n|--------|------|------|\n| 股权质押 | 未获取（港股不强制披露） | — |\n| 增减持 | 🟢 雷军 2025.11 增持 1 亿港元；🔴 林斌计划减持 20 亿美元 | 新浪财经、第一财经 |\n| 关联交易 | 🟡 顺为资本（雷军 51%）投资 600+ 企业，部分生态链公司收入高度依赖小米渠道（如素士 55-60%），证监会多次问询 | 证券时报 |\n| 负面搜索 | 🟡 SU7 致死事故、ESG 评级低、内部廉洁事件 | 多来源 |\n| 核心人员变动 | 🟡 洪锋/黎万强退休（2026.4），马骥离职，多名高管调岗 | 华尔街见闻、财联社 |\n\n### 行为特征分析\n\n**独立判断**：雷军在 2021 年全行业不看好的情况下宣布造车，属于典型的逆共识决策。2025 年结果证明执行力极强（41 万辆交付）。但雷军同时在推进手机、IoT、汽车、AI 大模型、自研芯片多条战线，战线过长的风险正在积累。\n\n**坦诚度**：FY2022 业绩大幅下滑时，管理层归因于全球手机市场下行和宏观环境——基本属实（同行也在下滑），但对投资组合损失的讨论较为简略。\n\n**能力圈意识**：小米从手机扩展到 IoT 再到汽车，每次跨界都超出传统能力圈。手机→IoT 成功了，汽车目前看执行力超预期，但汽车制造的复杂度远超消费电子，安全事故暴露了经验不足。\n\n**激励结构**：雷军 23.26% 持股，利益与股东高度一致。但 AB 股结构下 61.0% 投票权（年报数据）意味着外部股东无法制衡。董事会 7 人（3 执行+1 非执行+3 独立），INED 占 43%。CG Code 唯一偏离：董事长兼 CEO 未分设。\n\n---\n\n## 致命风险——芒格：倒过来想（第五步）\n\n| # | 死亡场景 | 因果链 | 已有迹象？ | 可逆？ | 来源 |\n|---|---------|--------|-----------|--------|------|\n| 1 | 汽车安全危机摧毁全品牌信任 | 更多致死事故→媒体放大→消费者对小米品牌产生「不安全」认知→手机/IoT 连带受损→生态飞轮反转 | **是**：已有 2 起致死事故、2 次召回、纯电子门把手设计缺陷争议 | 可逆但代价极高 | 第四步 |\n| 2 | 美国制裁/实体清单 | 被列入实体清单→失去高通/ARM 芯片供应→手机和汽车智能座舱核心零件断供→业务瘫痪 | 部分：2021 年曾被列入 CCMC 名单后移除，当前未被制裁，但中美科技博弈持续升级 | 不可逆（若真实施芯片级制裁） | 搜索 |\n| 3 | 汽车业务持续烧钱拖累集团财务 | 汽车 CapEx 持续攀升→FCF 被挤占→若同时遭遇手机下行周期→净现金快速消耗→被迫再融资稀释 | 部分：FCF 已从 351 亿降至 160 亿，CapEx 从 73 亿升至 182 亿 | 可逆（可放缓扩产） | 第二步 |\n| 4 | 林斌减持+创始人退出触发信心崩塌 | 林斌 20 亿美元减持→洪锋/黎万强退休→市场解读为内部人在跑→股价下跌→雷军一人扛不住所有业务 | **是**：减持计划已公告，联合创始人已退出 | 可逆 | 搜索 |\n| 5 | 智能手机市场结构性萎缩 | AI 原生设备替代手机→小米生态入口坍塌→IoT+互联网服务失去用户来源 | 弱：2026 年手机市场预计仅 -0.9%，但 AI Pin/AR 眼镜等替代品尚未成气候 | 不可逆（若手机真的被替代） | 第一步+行业数据 |\n\n⚠️ **不可逆风险已有迹象**：美国制裁风险有历史先例（2021 年 CCMC），虽已移除但中美关系持续紧张。若升级至芯片级制裁，小米缺乏华为级别的自研替代能力（海思 vs 澎湃），影响将极为严重。\n\n### 投资行动指引\n\n**仓位建议**：不可逆风险（美国制裁）当前无明确迹象但尾部概率不可忽视；可逆风险（安全事故、减持）已有明显迹象但不致命 → **中等仓位**，不宜重仓\n\n**卖出触发条件**：\n1. 再次发生 SU7/YU7 致死事故且监管介入（如停产整改）\n2. 美国将小米列入实体清单或限制芯片供应\n3. FCF 连续 2 年为负且净现金降至 500 亿以下\n\n---\n\n## 估值与安全边际（第六步）\n\n### 估值方法选择\n\n小米触发 SOTP（汽车占营收 23.2%，与传统业务属不同行业）：\n- **传统业务（手机+IoT+互联网）**：轻资产生态型 → PE + FCF Yield 交叉验证\n- **汽车业务**：重资产扩张期 → PS + 远期盈利折现\n\n### 行业估值环境\n\n- 港股科技板块 2026 年受中美关系、关税政策影响估值中枢下移\n- 小米从 2025 年 6 月高点 HK$61 腰斩至 HK$31.9，市值蒸发超 7,000 亿港元\n- AI + 汽车双概念降温后，市场从「给梦想定价」回归「看实际盈利」\n- 10 年期国债收益率 1.744%，股权风险溢价仍支持成长股估值\n\n### SOTP 估值\n\n**Segment 1：传统业务（手机+IoT+互联网）**\n\nFY2025 数据：收入 3,470 亿元，推测经营利润约 350 亿元（互联网服务贡献 ~285 亿毛利 + IoT 贡献 ~285 亿毛利 + 手机贡献 ~235 亿毛利，扣除 SG&A 和总部费用后估计）\n\n可比估值：\n- 美的集团 PE ~13.3x（纯制造，增长 <15%）\n- Apple PE ~33.9x（全球生态标杆）\n- 小米传统业务定位介于两者之间：有生态溢价但无 Apple 级品牌力\n\n给予 PE 15-18x → 估值 **5,250-6,300 亿元**\n\nFCF 验证：传统业务 FCF 约 250-300 亿元（总 FCF 160 亿 + 汽车 CapEx ~80 亿调回），FCF Yield = 250/5,250 = 4.8%，高于无风险利率 1.744% 约 3pct，合理。\n\n**Segment 2：汽车+AI 创新业务**\n\nFY2025 数据：收入 1,061 亿元，毛利率 24.3%（毛利 258 亿），经营利润 9 亿元（研发和销售费用吃掉大部分毛利）\nFY2026E：目标 55 万辆，ASP ~25 万元（推测，FY2025 为 25.1 万）→ 收入约 1,375 亿元（推测）；若经营利润率提升至 5-8%（毛利率 24.3% 下规模效应释放）→ 经营利润 69-110 亿元（推测）\n\n估值锚：\n- PS 法：可比蔚来/小鹏 PS ~1-2x → 1,061-2,122 亿元\n- 远期盈利法：假设 FY2027 交付 80 万辆、ASP 25 万、经营利润率 7%（毛利率 24%+ 支撑）→ 经营利润 140 亿，给 18x（高增长 EV）→ 2,520 亿元（推测）\n\n给予估值区间：**1,500-2,500 亿元**（上修，因 24.3% 毛利率远超预期）\n\n**集团 SOTP 合计**\n\n| 板块 | 估值区间（亿元） | 方法 |\n|------|-----------------|------|\n| 传统业务 | 5,250-6,300 | PE 15-18x |\n| 汽车+AI | 1,500-2,500 | PS + 远期盈利（24.3% 毛利率支撑上修） |\n| 净现金调整 | +1,965 | 净现金 |\n| 有息负债 | -361 | |\n| **集团估值** | **8,354-10,404** | |\n| **每股估值（HKD）** | **HK$35.0-43.5** | 按 26.05 亿股（年报实际股本），1 RMB≈1.09 HKD |\n\n注：US$8.55 亿零息可转债转股价 HK$36.74，若全部转股将稀释约 2.5 亿股，当前股价 HK$31.9 低于转股价，暂不会触发转股。\n\n### PE 整体法交叉验证\n\n| 指标 | 数值 |\n|------|------|\n| FY2025 调整后净利润 | 392 亿元 |\n| FY2026E 净利润（分析师一致预期） | ~500 亿元 |\n| 当前 PE (FY2025) | ~18.7x |\n| Forward PE (FY2026E) | ~14.7x |\n| 近 5 年 PE 20% 分位 | ~当前位置 |\n| 近 10 年 PE 中位数 | 25.4x |\n| 如回归中位数 | 392 × 25.4 × 1.09 / 26.05 = **HK$41.7** |\n| 如用 FY2026E + 18x PE | 500 × 18 × 1.09 / 26.05 = **HK$37.7** |\n\n**交叉验证**：SOTP 法（HK$35-43.5）与整体 PE 法（HK$37.7-41.7）大致吻合，合理估值中枢约 **HK$37-42**。\n\n**可转债隐含锚点**：US$8.55 亿零息可转债转股价 HK$36.74，发行时机构投资者对小米的合理估值判断。\n\n### 场景分析\n\n| 场景 | 核心假设 | 对应估值 | 假设来源 |\n|------|---------|---------|---------|\n| 汽车 80 万辆+毛利率 24%+传统业务 15% 增长 | 汽车 2027 交付 80 万辆、毛利率维持 24%+、经营利润率 7%；传统业务保持双位数增长；无重大安全事故 | **HK$45-55** | 第一步：汽车增速+生态飞轮；第二步：汽车毛利率 24.3% 趋势外推；第三步：竞争优势保持 |\n| 汽车 55 万辆+毛利率 22%+传统业务 10% 增长 | 汽车按 2026 目标完成、毛利率略降至 22%（竞争加剧）、经营利润率 4%；传统业务温和增长；手机毛利率企稳 | **HK$35-42** | 第二步：当前增速外推；行业数据：手机市场 -0.9%；手机毛利率 10.9% 的下行压力 |\n| 汽车安全危机+手机毛利率继续恶化 | 重大安全事故导致汽车销量降至 30 万辆、亏损 50 亿；手机毛利率降至 8%、出货量下降 10%；互联网服务增长停滞 | **HK$18-24** | 第五步：死亡场景 1；第二步：手机毛利率从 12.6%→10.9% 的下行趋势 |\n\n### 安全边际\n\n- **最差合理场景估值**：HK$18-24（汽车安全危机+手机毛利率恶化叠加）\n- **当前价格**：HK$31.9\n- **当前价格 vs 最差合理场景**：高于最差场景上沿（HK$24）约 33%\n- **净现金保护**：每股净现金 HK$8.2（1,965 亿 × 1.09 / 26.05 亿股），提供约 26% 的硬底支撑\n- **可转债锚**：转股价 HK$36.74，当前价格已低于机构认可的合理估值\n- **安全边际判断**：**边缘偏积极**。当前价格已从高点腰斩，低于合理估值区间下沿（HK$37）和可转债转股价（HK$36.74），估值吸引力在增强。但距最差合理场景（HK$18-24）仍有 33% 下行空间，且手机毛利率下行趋势（12.6%→10.9%）尚未企稳，汽车安全风险已有迹象。净现金提供保护，但汽车持续投入会消耗现金。\n\n---\n\n## 结论\n\n**值不值得持有**：小米是一家执行力极强的生态型公司，汽车业务的「从 0 到 1」已经成功，关键问题是「从 1 到 10」能否在不出重大安全事故的前提下实现。生意本身有吸引力，但每个业务线都有比小米做得更好的专精对手，护城河来自生态整合而非单点壁垒——这种护城河一旦用户感知不到价值，就会比想象中脆弱。\n\n**当前价格**：HK$31.9 低于合理估值区间下沿（HK$37）和可转债转股价（HK$36.74），Forward PE ~14.7x 在历史低位区间。估值已进入有吸引力的区间，但需警惕两个隐忧：手机毛利率从 12.6% 降至 10.9% 的趋势是否会持续，以及 GAAP 利润中 133 亿公允价值收益的不可持续性。\n\n**持有期关注点**（任一出现需重新评估）：\n1. SU7/YU7 再次发生致死事故或监管停产整改\n2. 美国对小米实施任何形式的制裁或限制\n3. FCF 连续为负且净现金跌破 500 亿\n4. 雷军卸任或明显减少对公司的投入\n\n**需要进一步了解**：\n1. 小米自研芯片（澎湃系列）的实际进度——决定应对制裁风险的能力。雷军称 2026 年将实现自研芯片+自研 OS+自研 AI 大模型「大会师」，但细节未披露\n2. 手机毛利率 10.9% 下行的具体归因——国补减少/零部件涨价/竞争各占多少？是否已触底？\n3. 汽车 24.3% 毛利率的可持续性——SU7 Ultra 高端化拉动 vs 后续中低端车型（如紧凑型 SUV）对毛利率的稀释\n4. VIE 结构下互联网服务的监管风险——VIE 收入占 24.1%，若政策收紧影响几何\n\n---\n\n## 数据完整度\n\n| 数据类别 | 状态 |\n|---------|------|\n| 5 年财务数据 | ✅ 营收/利润/毛利率/ROE/现金流完整 |\n| 同行对比 | ✅ 手机/IoT/汽车三维度可比公司数据齐全 |\n| 管理层信息 | ⚠️ 关键人物信息完整，股权质押未获取（港股不强制披露） |\n| 海外对标 | ✅ Apple/Samsung 数据完整 |\n| 估值数据 | ⚠️ PE 历史分位数仅有近似值，PB 历史分位数未获取 |\n| 年报原文 | ✅ 已获取 FY2025 年报，分部毛利率/KPI/股本/关联交易/税务/CG 偏离均已提取 |\n\n**未获取数据对结论的影响**：\n- 股权质押未获取（港股不强制披露）：无法排除主要股东质押爆仓风险，但鉴于小米股价已腰斩且雷军在增持，该风险概率较低\n- PB 历史分位数缺失：对整体估值影响不大（小米非 PB 导向型公司）\n- Pillar Two/全球最低税披露未在年报中找到：当前实际税率 16.3%，若未来适用 15% 全球最低税影响有限"}}, {"id": "伊利-600887", "name": "伊利股份", "ticker": "600887.SS", "market": "A股", "sector": "消费", "confidence": "bullish", "verdict": "逐步建仓可以，¥20-22 更好", "updated": "2026-05-05", "files": {"thesis": "# 伊利股份 (600887) 长期投资分析备忘录\n\n**分析日期**：2026-05-05\n**当前股价**：¥25.25（2026-04-27 收盘） | 市值：~¥1,597亿\n**公司类型**：轻资产高毛利型（品牌驱动，现金奶牛特征渐显）\n\n---\n\n## 一句话总结\n\n中国最大、全球第四的乳企，靠品牌（92.4% 渗透率）+ 全国分销网络 + 上游牧场垂直整合赚钱，当前处于从高速增长转入稳态回报的过渡期——营收增速接近零，但毛利率连续 4 年提升、扣非净利润创历史新高、分红率 75%+、股息率 4.6%。\n\n## 投资论点\n\n### 核心看多逻辑\n\n1. **毛利率结构性改善**：毛利率从 2021 年 30.6% 提升至 2025 年 34.58%（+4pct），驱动力是产品结构升级（奶粉占比从 ~23% 升至 28.3%，毛利 41.58%）+ 原奶周期低位（~3.0 元/kg），即使原奶回升，产品结构升级带来的毛利提升可部分对冲。来源：2025 年报、东方财富深度报告。\n\n2. **全球 Top 5 乳企，估值显著折价**：PE 13.8x vs 雀巢 22.5x / 达能 23.6x，PB 2.9x vs 雀巢 6.2x。即使考虑 A 股折价 30-40%，当前估值仍在折价区间下沿。来源：Investing.com、Yahoo Finance。\n\n3. **股东回报加速**：2025 年分红 87.29 亿（占净利 75.48%），承诺未来三年分红率不低于 75%、每股不低于 ¥1.22。FCF yield ~6.3% vs 10 年国债 1.744%，为无风险利率的 3.6 倍。来源：2025 年报分红方案。\n\n### 关键假设\n\n这些假设如果错了，以上论点不成立：\n1. 原奶价格回升后，毛利率能守住 32%+（产品结构升级能对冲至少一半的成本上行）\n2. 液态奶市占率维持 38%+ 不被蒙牛或区域品牌侵蚀\n3. 婴幼儿奶粉虽面临出生率下降，但 Yili 份额仍能维持/扩大（18.3% → 20%+），成人奶粉填补增量\n\n## 生意理解\n\n### 商业模式\n\n伊利是快消品（FMCG）品牌公司。核心赚钱逻辑：**品牌溢价 × 全国分销网络 × 上游成本控制**。\n\n- **收入结构**：液体乳 704.22 亿（60.8%，毛利 31.43%）、奶粉及奶制品 327.69 亿（28.3%，毛利 41.58%，+10.42%）、冷饮 98.22 亿（8.5%，毛利 37.89%，+12.63%）、其他 ~29 亿。奶粉和冷饮是增长引擎，液态奶是基本盘。\n- **赚钱机制**：走量 + 品牌溢价。毛利 35% 属于 FMCG 合理水平，净利率 ~10% 说明费用率偏高（销售费用率 ~20%+），但品牌投入是乳企的必要支出。\n- **经营杠杆**：收入规模效应明显，营收从 969 亿增至 1159 亿的同时，净利率从 7.3% 提至 10%。\n- **客户集中度低**：日常消费品，面向 13 亿消费者，无单一客户依赖。\n\n### 产业链位置\n\n- **上游**：通过控股优然牧业（全球最大原奶供应商，94.28% 原奶卖给伊利）实现垂直整合，这是相比蒙牛的结构性优势。当前原奶处于周期低位（~3.0 元/kg），90% 牧场亏损，去产能加速，预计 2026 年底至 2027 年价格企稳回升。\n- **下游**：全国经销网络覆盖 13 亿消费者，品牌渗透率 92.4%。对零售终端有强议价权。\n- **不可替代性**：乳品是基础食品，品牌心智和冷链分销网络构成深度壁垒，不可能被绕过。\n\n### 市场空间\n\n- 中国乳制品市场规模 ~5000 亿元，\"两超多强\"格局（伊利蒙牛 CR2 ~45.5%）\n- 人均乳制品消费 ~40kg，远低于全球平均 ~115kg，但增速已放缓\n- 增量来自结构升级：低温鲜奶（+19.68%）、奶酪、成人营养、高端化\n- 天花板：5-10 年内总量见顶的概率较高，但品类升级 + 提价仍有空间\n\n## 财务画像\n\n### 公司类型判断\n\n**轻资产高毛利型**（品牌驱动）。决策树路径：非金融机构 → R&D 非命脉（停研发 3-5 年仍可赚钱）→ 利润非外部价格决定（不同于纯周期股）→ FCF/净利润 >0.8 但营收仍有增长预期（2026 目标 +4.8%）→ 品牌是核心竞争力 → 轻资产高毛利型。现金奶牛特征正在显现（分红率 75%+、增速放缓），但尚未完全进入收获模式。\n\n### 关键指标\n\n| 指标 | 2020 | 2021 | 2022 | 2023 | 2024 | 2025 | 趋势 |\n|------|------|------|------|------|------|------|------|\n| 营收（亿） | 968.9 | 1,106 | 1,231.7 | 1,257.6 | 1,157.8 | 1,159.3 | 5 年 CAGR 3.6% |\n| 归母净利润（亿） | 70.8 | 92.9 | 94.3 | 104.3 | 84.5* | 115.7 | 5 年 CAGR 10.3% |\n| 扣非净利润（亿） | 未获取 | 未获取 | 未获取 | 100.3 | 未获取 | 110.7 | 扣非 2025 创新高 |\n| 毛利率 | ~30.6% | ~30.6% | 32.26% | 32.58% | 34.03% | 34.58% | ↑ 连续 4 年提升 |\n| 净利率 | ~7.3% | ~8.4% | ~7.7% | 8.18% | ~7.3%*/~10% | ~10.0% | ↑ 结构性改善 |\n| ROE | ~25% | ~25% | ~20%+ | 20.20% | 15.89%* | 20.87% | 稳定 ~20%（2024 受减值拖累） |\n| 经营现金流（亿） | 未获取 | 155.2 | 未获取 | 未获取 | 217.4 | 143.4 | 强劲，持续高于净利润 |\n| 分红率 | 未获取 | 未获取 | 70.3% | 未获取 | 91.4%* | 75.48% | ↑ 近 4 年连续 >70% |\n\n*2024 年含澳优商誉减值 30.37 亿，剔除后净利润 115.39 亿（+12.2%）、ROE ~19%+\n\n**5 年营收 CAGR 3.6%，利润 CAGR 10.3%** —— 利润增速快于营收，说明经营效率在提升（毛利率改善 + 费用率优化）。\n\n### 盈利质量\n\n- **经营现金流 / 净利润**：2021 年 155.2/92.9 = 1.67x，2025 年 143.4/115.7 = 1.24x，盈利含金量高\n- **扣非净利润 vs 净利润**：2025 年扣非 110.68 vs 归母 115.65，差额 4.97 亿为正常非经常性损益（推测：政府补贴 + 投资收益）\n- **自由现金流估算**：2021 年经营 FCF 116.8 亿（数据来源：搜索结果），2025 年 OCF 143.4 亿减去资本开支（推测 ~40-50 亿）≈ FCF ~93-103 亿\n- **FCF / 净利润**：~0.85（推测），大于 0.8 关口\n\n### 异常清单\n\n| 异常项 | 性质 | 追因结论 |\n|--------|------|----------|\n| 2024 年营收下降 7.9% | 暂时性 | 行业去库存周期 + 澳优整合阵痛，2025 年已企稳（+0.13%），2026 Q1 恢复增长（+5.47%） |\n| 2024 年商誉减值 30.37 亿 | 结构性（一次性出清） | 澳优并购溢价过高 + 出生率下降导致婴配粉市场缩小。已一次性计提，后续减值压力降低但不排除二次减值 |\n| 毛利率 4 年连升 ~4pct | 暂时性+结构性混合 | 结构性因素（产品升级、高毛利品类占比提升）+ 周期性因素（原奶低价）。原奶回升后毛利率可能回调 1-2pct |\n| 2025 OCF 143 亿 vs 2024 的 217 亿 | 待确认 | 2024 OCF 异常高可能受预收/应付增加影响，2025 回归正常水平。两年平均 ~180 亿仍然强劲 |\n\n## 竞争优势\n\n### 国内可比\n\n| 指标 | 伊利 (600887) | 蒙牛 (02319.HK) | 光明 (600597) | 新乳业 (002946) |\n|------|-------------|----------------|-------------|---------------|\n| 2025 营收（亿） | 1,159 | 822 | ~250（推测） | ~107（推测） |\n| 毛利率 | 34.58% | ~41.75%（H1） | ~30%（推测） | ~25%（推测） |\n| 净利率 | ~10% | ~2%（含减值） | ~1%（推测） | ~3%（推测） |\n| ROE | 20.87% | ~11%（推测） | ~5%（推测） | ~10%（推测） |\n| 市占率 | #1（>38% 液奶） | #2（~20% 液奶） | #3（区域） | #4（区域） |\n| 品牌渗透率 | 92.4% | 未获取 | 未获取 | 未获取 |\n\n**核心差距分析**：\n- **vs 蒙牛**：蒙牛毛利率更高（41.75% vs 34.58%），但净利率和 ROE 远低于伊利。说明伊利的优势在运营效率和费用控制，而非产品定价。伊利营收领先蒙牛 337 亿（2025），差距从 2020 年的 ~100 亿持续扩大。蒙牛 2025 营收下降 7.3%，伊利仅微增 0.13% —— 行业承压时龙头更抗跌。\n- **vs 光明/新乳业**：体量差距巨大（>4x），不构成实质威胁，但在低温鲜奶等细分品类有局部竞争。\n\n### 海外对标\n\n| 指标 | 伊利 | 雀巢（乳品） | 达能（乳品） | Lactalis |\n|------|------|------------|------------|---------|\n| 全球排名 | #4（$16bn） | #2（$24bn） | #7（$15.2bn） | #1（$35bn） |\n| PE | 13.8x | 22.5x | 23.6x | 非上市 |\n| PB | 2.9x | 6.2x | 2.52x | N/A |\n| ROE | ~20% | ~20%+ | ~10% | N/A |\n| 股息率 | 4.59% | ~3% | ~3.5% | N/A |\n\n**定位**：伊利收入规模已超达能乳品业务，与雀巢乳品差距约 50%。在中国市场是绝对龙头，但国际化程度远低于全球 top 3。估值大幅折价（PE 折价 ~40%），部分反映 A 股市场折价和增速放缓预期，但即使调整后仍偏低。ROE 与雀巢相当，优于达能。\n\n**追赶/领先判断**：伊利在中国市场领先全球同行，但在全球化和品类多元化（奶酪、植物基等）上仍落后 5-10 年。海外拓展（东南亚、大洋洲布局）处于早期。\n\n### 优势脆弱性\n\n- **蒙牛追赶成本**：蒙牛理论上有资源和品牌追赶，但过去 5 年差距反而在扩大，短期内追平可能性低\n- **跨界搅局**：乳制品进入门槛高（奶源 + 冷链 + 品牌），互联网巨头/新消费品牌难以颠覆\n- **3 年内优势消失的条件**：几乎不可能，除非发生重大食品安全事件或管理层剧变\n\n## 管理层\n\n### 关键人物\n\n| 人物 | 职位 | 持股 | 备注 |\n|------|------|------|------|\n| 潘刚 | 董事长兼总裁 | 3.55%（2.25 亿股） | 1970 年生，人大经济学博士，任职超 20 年 |\n| 陈龙 | 董事 | 未获取 | 2026 年主持董事会 |\n| 高振宇 | 新任董事 | 未获取 | 2025 年补选 |\n\n**无实际控制人**（自 2011 年起）。第一大股东呼和浩特投资有限责任公司（呼和浩特国资委控制）持股 8.42%，潘刚个人 3.55%。\n\n### 排雷清单\n\n| 检查项 | 结果 | 来源 |\n|--------|------|------|\n| 股权质押 | ⚠️ 潘刚曾质押股权用于融资购股，2026 年初减持 0.98% 偿还质押贷款（16.43 亿） | cninfo 公告 |\n| 增减持 | ⚠️ 潘刚 2026 年 1-3 月减持 6199 万股（0.98%），套现 16.43 亿，原因为偿还融资借款。首次减持。 | 新浪财经 |\n| 关联交易 | ⚠️ 优然牧业 94.28% 原奶卖给伊利，构成重大关联交易，但属于产业链垂直整合逻辑 | 年报、中邮研报 |\n| 负面搜索 | 未发现重大负面（2012 年汞事件为历史问题，已解决） | WebSearch |\n| 核心人员变动 | 朝鲁辞任董事（工作变动），高振宇补选。潘刚团队整体稳定 | cninfo 公告 |\n| 薪酬 | 潘刚 1966 万，连续 3 年下滑（2021 年 2296 万 → 2025 年 1966 万），与业绩挂钩 | 瑞财经 |\n\n### 行为特征\n\n- **独立判断**：2022-2024 年行业承压期未盲目扩产，聚焦产品结构升级和利润率改善，与蒙牛大规模并购扩张形成对比\n- **坦诚度**：2024 年年报坦承澳优经营不及预期并计提 30.37 亿减值，未掩饰。管理层主动下调出生率预期\n- **能力圈意识**：核心业务始终围绕乳制品，未跨界进入无关领域。B2B 业务和国际化是围绕主业的合理延伸\n- **激励结构**：潘刚持股 3.55%（市值 ~5.7 亿），但 2026 年减持还债说明此前购股主要靠融资而非自有资金，利益绑定程度有所削弱\n\n### 风险信号\n\n潘刚减持还债这一事件需要关注：虽然原因清晰（偿还股权激励融资），但首次减持 + 股价在低位减持的信号不佳。后续若继续减持需警惕。\n\n## 致命风险（芒格：倒过来想）\n\n| # | 死亡场景 | 因果链 | 已有迹象？ | 可逆？ | 来源 |\n|---|---------|--------|-----------|--------|------|\n| 1 | 原奶价格大幅反转 + 价格战 | 原奶供需再平衡 → 成本上升 3-5 元/kg → 毛利率压缩 3-4pct → 叠加蒙牛价格战 → 净利润腰斩 | ⚠️ 部分（去产能接近尾声，2026-2027 奶价预计企稳回升） | 可逆（周期性） | 第一步上游分析、中邮研报 |\n| 2 | 出生率持续下降 → 婴配粉业务萎缩 | 出生人口跌破 800 万 → 婴配粉市场缩至 500 亿以下 → 澳优再次减值 → 奶粉板块利润大幅下滑 | ⚠️ 明确（出生率已连续多年下降，2024 已计提 30.37 亿减值） | 部分可逆（成人奶粉可填补，但婴配粉高毛利无法完全替代） | 第二步异常追因 |\n| 3 | 食品安全事件 | 产品检出有害物质 → 全国下架 → 品牌信任崩塌 → 市占率大跌 | 无当前迹象（已获 BRCGS 认证、全球金标认证） | 部分可逆（2008 三聚氰胺行业恢复用了 3-5 年） | 行业历史 |\n| 4 | 潘刚离任 + 治理混乱 | 无实控人 → 管理层变动引发内部权力争夺 → 战略失焦 → 经营恶化 | ⚠️ 潜在（潘刚 55 岁，无明确接班安排） | 可逆但耗时 | 第四步管理层 |\n| 5 | 消费降级长期化 | 经济下行 → 消费者转向低价白牌乳品 → 品牌溢价消失 → 收入利润双降 | ⚠️ 部分（2024 营收下降可能部分反映此趋势） | 可逆（消费周期） | 宏观环境 |\n\n**⚠️ 不可逆风险已有迹象**：无。所有风险均属可逆范畴。\n\n**仓位建议**：风险可控且多为可逆 → **中等仓位可行**。主要风险是原奶周期反转压缩利润，但这是预期内的、可对冲的周期性波动。\n\n**卖出触发条件**：\n1. 毛利率连续 2 季度跌破 31%（原奶涨价 + 竞争加剧双重打击确认）\n2. 出现重大食品安全事件\n3. 潘刚非正常离任 + 管理层出现治理争端\n\n## 估值与安全边际\n\n### 估值方法\n\n公司类型为轻资产高毛利型 → 主方法 PE 历史分位数 + FCF Yield 交叉验证。\n\n**行业估值环境**：\n- 乳制品板块当前处于机构低配状态（行业增速放缓、消费降级担忧），估值中枢较 3 年前系统性下移\n- 高股息 / 防御性资产在低利率环境（10 年国债 1.744%）下有估值支撑\n- 政策面中性偏正（奶业振兴政策、消费升级导向）\n\n### PE 估值\n\n| 指标 | 数值 |\n|------|------|\n| 当前 PE（TTM） | 13.8x（基于 2025 净利 115.65 亿、63.25 亿股、股价 ¥25.25） |\n| 近 5 年 PE 均值 | ~25x |\n| 近 5 年 PE 低值 | ~13-14x（当前位置） |\n| 历史分位数 | ~5-10%（近历史底部） |\n\n基本面验证：当前 ROE 20.87% 高于 5 年均值（~20%），扣非净利润创历史新高。PE 处于历史底部但基本面并未恶化 → **历史分位数低估了当前合理估值**。但增速放缓（CAGR 3.6%）确实压缩了合理 PE 中枢。\n\n合理 PE 区间：15-20x（考虑增速放缓但盈利质量提升、分红率高）。\n\n### FCF Yield 估值\n\n| 指标 | 数值 |\n|------|------|\n| 2025 OCF | 143.44 亿 |\n| 推测资本开支 | ~40-50 亿 |\n| 推测 FCF | ~93-103 亿 |\n| FCF Yield（FCF / 市值） | 5.8%-6.4% |\n| 10 年国债 | 1.744% |\n| FCF Yield / 无风险利率 | 3.3-3.7x |\n\nFCF Yield 5.8-6.4% 显著高于无风险利率。如果 FCF Yield 回归到 4-5%（仍为无风险利率的 2.3-2.9 倍），对应市值 1,860-2,575 亿，每股 ¥29.4-40.7。\n\n### DDM 辅助验证\n\n| 假设 | 保守 | 基准 |\n|------|------|------|\n| 当前每股分红 | ¥1.38 | ¥1.38 |\n| 分红增长率 | 2%（对应品类天花板 + 温和提价） | 4%（对应品类升级 + 份额扩张） |\n| 折现率 | 8% | 7% |\n| DDM 估值 | ¥23.46 | ¥47.84 |\n\nDDM 对折现率极其敏感，仅作参考。保守假设下估值 ¥23.46 接近当前价格，说明当前价格已基本反映了保守预期。\n\n### 海外对标估值\n\n| 公司 | PE | PB | ROE | 股息率 |\n|------|----|-----|-----|--------|\n| 雀巢 | 22.5x | 6.2x | ~20% | ~3% |\n| 达能 | 23.6x | 2.52x | ~10% | ~3.5% |\n| 伊利 | 13.8x | 2.9x | 20.87% | 4.59% |\n\n伊利 ROE 与雀巢相当、远高于达能，但 PE 折价 ~40%。如果给予 15-18x PE（相对雀巢/达能折价 25-35%），对应 ¥27.5-33.0。\n\n### 场景分析\n\n| 场景 | 核心假设 | 预计净利润 | 合理 PE | 对应估值 | 假设来源 |\n|------|---------|-----------|---------|---------|---------|\n| 增速恢复 5%+毛利率维持 34%+ | 管理层 2026 目标达成、原奶温和回升 | 120-125 亿 | 17-20x | ¥32.3-39.5 | 第一步：2026 目标 1215 亿、Q1 已增长 5.47% |\n| 低增长 2-3%+毛利率小幅压缩至 33% | 原奶回升、消费温和复苏 | 95-100 亿 | 14-17x | ¥21.0-26.9 | 第五步：原奶周期反转 + 第三步竞争加剧 |\n| 营收停滞+原奶大涨+价格战（最差合理） | 多重利空叠加、类似 2024 | 75-85 亿 | 12-14x | ¥14.2-18.8 | 第五步死亡场景 1+5 叠加 |\n\n### 安全边际\n\n- **最差合理场景估值**：¥14.2-18.8（中位数 ¥16.5）\n- **当前价格**：¥25.25\n- **当前价格 vs 最差合理场景中位数**：高出 53%\n- **安全边际判断**：**边缘**\n\n理由：当前价格显著高于最差合理场景估值，price in 了不少好的假设（增速恢复、毛利率维持）。但考虑到：\n1. 公司品质优良（ROE 20%+、分红 75%+、全球 Top 5 乳企）→ 好生意对估值有支撑\n2. FCF Yield 6%+ 提供持有期收益缓冲\n3. 2026 Q1 数据已确认增速恢复（+5.47%）\n4. 最差合理场景发生概率较低（需原奶大涨 + 价格战 + 消费降级同时发生）\n\n综合判断：**当前价格在合理估值区间下沿附近（Scenario B 的 ¥21-27），上行空间来自 Scenario A（¥32-40）。对追求分红收益的投资者有吸引力（4.6% 股息 + 温和增长），对追求大幅低估的价值投资者安全边际不足。**\n\n### 敏感性分析：PE 法\n\n| 净利润\\PE | 12x | 14x | 16x | 18x | 20x |\n|-----------|-----|-----|-----|-----|-----|\n| 80 亿 | ¥15.2 | ¥17.7 | ¥20.3 | ¥22.8 | ¥25.3 |\n| 95 亿 | ¥18.0 | ¥21.0 | ¥24.0 | ¥27.0 | ¥30.0 |\n| 110 亿 | ¥20.9 | ¥24.4 | ¥27.8 | ¥31.3 | ¥34.8 |\n| 120 亿 | ¥22.8 | ¥26.6 | ¥30.4 | ¥34.1 | ¥37.9 |\n\n当前价格 ¥25.25 对应 110 亿净利 × 14.5x PE 或 95 亿净利 × 16.8x PE。\n\n## 结论\n\n**值不值得持有**：值得。伊利是中国乳业无可争议的龙头，品牌壁垒深厚、ROE 稳定 ~20%、现金流强劲、分红率 75%+。在低利率环境下，4.6% 股息率 + 温和增长的组合具有吸引力。主要担忧是增速放缓和原奶周期反转，但这些已部分反映在当前低估值中。\n\n**当前价格**：安全边际边缘。PE 13.8x 处于历史底部、FCF Yield 6%+ 有吸引力，但并非明显低估。对于看重分红收益和防御性的投资者，当前价格可逐步建仓；对于追求大幅折价买入的投资者，¥20-22（对应 PE 11-12x）会是更舒适的买点。\n\n**持有期关注点**：\n1. 每季度毛利率趋势（原奶价格反转的前瞻指标）\n2. 婴幼儿奶粉市场份额变化（出生率影响的观测指标）\n3. 潘刚后续持股变动和接班安排\n4. 蒙牛竞争策略变化（价格战风险的观测指标）\n\n**需要进一步了解**：\n1. 2020-2023 年各年详细经营现金流和资本开支（当前仅有部分年份数据），以验证 FCF 长期稳定性\n2. 优然牧业关联交易定价机制的公允性\n3. 商誉剩余余额和进一步减值风险的具体数字\n4. 国际化业务（东南亚、大洋洲）的具体财务贡献\n\n## 数据完整度\n\n| 数据类别 | 状态 |\n|---------|------|\n| 5 年财务数据 | ⚠️ 2020-2022 部分指标（OCF、扣非、分红）未获取完整数据 |\n| 同行对比 | ⚠️ 蒙牛数据较完整，光明/新乳业仅有部分数据，毛利率/净利率为推测 |\n| 管理层信息 | ✅ 核心人物、持股变动、薪酬、减持事件均已获取 |\n| 海外对标 | ✅ 全球 Top 10 排名、雀巢/达能估值数据已获取 |\n| 估值数据 | ✅ PE/PB/股息率/FCF Yield 等核心估值指标已获取 |\n\n**未获取数据对结论的影响**：2020-2022 年 OCF 和资本开支数据缺失导致 FCF 长期稳定性验证不够充分。但已有数据（2021 FCF 116.8 亿、2025 OCF 143.4 亿）表明现金流创造能力强劲，不太可能改变\"盈利含金量高\"的结论。光明/新乳业的推测数据不影响核心竞争格局判断（伊利龙头地位无争议）。"}}];

// Yahoo Finance
async function fetchPrices(){
  const tickers=[...new Set(STOCKS.map(s=>s.ticker))];
  const url=`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${tickers.join(",")}`;
  const el=document.getElementById("priceStatus");
  try{
    const resp=await fetch(url);
    if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data=await resp.json();
    if(data.quoteResponse&&data.quoteResponse.result){
      for(const q of data.quoteResponse.result){
        prices[q.symbol]={price:q.regularMarketPrice,change:q.regularMarketChangePercent,currency:q.currency||""};
      }
    }
    onPricesDone(el);
  }catch(e){
    try{
      const proxy="https://api.allorigins.win/raw?url=";
      const resp2=await fetch(proxy+encodeURIComponent(url));
      if(!resp2.ok) throw new Error(`Proxy ${resp2.status}`);
      const data2=await resp2.json();
      if(data2.quoteResponse&&data2.quoteResponse.result){
        for(const q of data2.quoteResponse.result){
          prices[q.symbol]={price:q.regularMarketPrice,change:q.regularMarketChangePercent,currency:q.currency||""};
        }
      }
      onPricesDone(el);
    }catch(e2){
      el.className="price-status error";
      el.innerHTML=`<span>⚠ 加载失败，点击重试</span>`;
      el.onclick=()=>{
        el.className="price-status loading";
        el.innerHTML=`<div class="spinner"></div><span>重试中...</span>`;
        el.onclick=null;
        fetchPrices();
      };
    }
  }
}
function onPricesDone(el){
  el.className="price-status done";
  el.innerHTML=`<span>✓ 已加载</span>`;
  renderTable();
}

      const f=b.dataset.f,v=b.dataset.v;
      if(f==="m")fMarket=v;else if(f==="c")fConf=v;else fSector=v;
      const container=f==="m"?mEl:f==="c"?cEl:sEl;
      container.querySelectorAll(".fbtn").forEach(x=>x.classList.remove("on"));
      b.classList.add("on");
      renderTable();
    });
  });
}

// Table
function renderTable(){
  const tbody=document.getElementById("tbody");
  let list=STOCKS.filter(s=>{
    if(fMarket!=="all"&&s.market!==fMarket)return false;
    if(fConf!=="all"&&s.confidence!==fConf)return false;
    if(fSector!=="all"&&s.sector!==fSector)return false;
    if(query){
      const q=query.toLowerCase();
      return s.name.toLowerCase().includes(q)||s.ticker.toLowerCase().includes(q)||s.sector.toLowerCase().includes(q)||(s.verdict||"").toLowerCase().includes(q);
    }
    return true;
  });

  list.sort((a,b)=>{
    const md=(MKT_ORD[a.market]??99)-(MKT_ORD[b.market]??99);
    if(md!==0)return md;
    return CONF_ORD[a.confidence]-CONF_ORD[b.confidence];
  });

  if(!list.length){
    tbody.innerHTML=`<tr class="empty-row"><td colspan="6">没有匹配的股票</td></tr>`;
    return;
  }

  let h="";
  let lastMkt="";
  for(const s of list){
    if(s.market!==lastMkt){
      lastMkt=s.market;
      h+=`<tr><td colspan="6" style="padding:6px 14px;font-size:11px;color:var(--t3);background:var(--s2);font-weight:600;letter-spacing:.3px">${s.market}</td></tr>`;
    }
    const p=prices[s.ticker];
    const priceStr=p&&p.price!=null?p.price.toFixed(2):"--";
    const chgStr=p&&p.change!=null?((p.change>=0?"+":"")+p.change.toFixed(2)+"%"):"--";
    const chgCls=p&&p.change!=null?(p.change>=0?"up":"down"):"";
    const selected=selId===s.id?"sel":"";
    h+=`<tr class="${selected}" data-id="${s.id}" onclick="selectStock('${s.id}')">
      <td><span class="t-name">${s.name}</span> <span class="t-ticker">${s.ticker}</span></td>
      <td class="t-sector">${s.sector}</td>
      <td class="t-price">${priceStr}</td>
      <td class="t-chg ${chgCls}">${chgStr}</td>
      <td><span class="badge ${s.confidence}">${CONF[s.confidence].s}</span></td>
      <td class="t-verdict">${s.verdict||""}</td>
    </tr>`;
  }
  tbody.innerHTML=h;
}

// Detail
function selectStock(id){
  selId=id;
  closeAllPanels();
  document.querySelectorAll("#tbody tr").forEach(r=>r.classList.remove("sel"));
  const row=document.querySelector(`tr[data-id="${id}"]`);
  if(row)row.classList.add("sel");

  const s=STOCKS.find(x=>x.id===id);
  if(!s)return;
  const det=document.getElementById("detail");
  const fk=Object.keys(s.files||{});
  const tl={thesis:"Thesis",monitor:"Monitor",archive:"Archive",model:"Model"};

  const p=prices[s.ticker];
  let priceInfo="";
  if(p&&p.price!=null){
    const sign=p.change>=0?"+":"";
    const cls=p.change>=0?"up":"down";
    priceInfo=`<span style="font-family:'SF Mono',monospace;font-size:13px;font-weight:600">${p.price.toFixed(2)}</span> <span class="t-chg ${cls}" style="font-size:12px">${sign}${p.change.toFixed(2)}%</span>`;
  }

  let tabs="";
  if(fk.length>1){
    tabs=`<div class="tabs">${fk.map((k,i)=>`<button class="tab${i===0?" on":""}" onclick="switchTab('${id}','${k}',this)">${tl[k]||k}</button>`).join("")}</div>`;
  }

  det.innerHTML=`
    <div class="detail-header">
      <div class="detail-title"><span class="sname">${s.name}</span> <span class="badge ${s.confidence}">${CONF[s.confidence].l}</span></div>
      <div class="detail-right">
        <div class="detail-meta">${s.ticker} ${priceInfo?("· "+priceInfo):""} · updated ${s.updated||"--"}</div>
        <button class="detail-close" onclick="closeDetail()">✕</button>
      </div>
    </div>
    ${tabs}
    <div class="detail-body" id="detailBody"></div>
  `;
  requestAnimationFrame(()=>det.classList.add("open"));

  if(fk.length>0) renderContent(id,fk[0]);
}

function switchTab(id,key,btn){
  const det=document.getElementById("detail");
  det.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
  btn.classList.add("on");
  renderContent(id,key);
}

function renderContent(id,key){
  const body=document.getElementById("detailBody");
  const cacheKey=id+"-"+key;
  if(renderedPanels[cacheKey]){
    body.innerHTML=renderedPanels[cacheKey];
    return;
  }
  const s=STOCKS.find(x=>x.id===id);
  if(!s||!s.files[key])return;
  const html=`<div class="md">${marked.parse(s.files[key])}</div>`;
  renderedPanels[cacheKey]=html;
  body.innerHTML=html;
}

function closeAllPanels(){
  document.getElementById("detail").classList.remove("open");
  document.getElementById("wlPanel").classList.remove("open");
  document.getElementById("notesPanel").classList.remove("open");
  document.getElementById("noteFormWrap").style.display="none";
  document.getElementById("selPop").style.display="none";
}

function closeDetail(){
  closeAllPanels();
  selId=null;
  document.querySelectorAll("#tbody tr").forEach(r=>r.classList.remove("sel"));
}

document.getElementById("q").addEventListener("input",e=>{query=e.target.value;renderTable();});

// Wishlist (localStorage)
const WL_KEY="inv-dashboard-wishlist";
function loadWl(){try{return JSON.parse(localStorage.getItem(WL_KEY))||[];}catch(e){return[];}}
function saveWl(list){localStorage.setItem(WL_KEY,JSON.stringify(list));}
function updateWlCnt(){document.getElementById("wlCnt").textContent=loadWl().length;}

function toggleWishlist(){
  const p=document.getElementById("wlPanel");
  const isOpen=p.classList.contains("open");
  closeAllPanels();
  if(!isOpen){p.classList.add("open");renderWl();}
}

function renderWl(){
  const body=document.getElementById("wlBody");
  const list=loadWl();
  if(!list.length){body.innerHTML=`<div class="wl-empty">还没有想研究的股票</div>`;return;}
  body.innerHTML=list.map((item,i)=>`
    <div class="wl-item" id="wli-${i}">
      <div class="wl-item-row">
        <div>
          <span class="wl-item-name">${esc(item.name)}</span>
          ${item.ticker?`<span class="wl-item-ticker">${esc(item.ticker)}</span>`:""}
        </div>
        <div class="wl-item-actions">
          <button onclick="editWlItem(${i})" title="Edit">✎</button>
          <button onclick="deleteWlItem(${i})" title="Delete">✕</button>
        </div>
      </div>
      ${item.notes?`<div class="wl-item-notes">${esc(item.notes)}</div>`:""}
      <div class="wl-item-date">${item.date||""}</div>
    </div>
  `).join("");
}

function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML;}

function showWlForm(idx){
  const body=document.getElementById("wlBody");
  const list=loadWl();
  const item=idx!=null?list[idx]:{name:"",ticker:"",notes:""};
  const formHtml=`
    <div class="wl-form" id="wlForm">
      <input type="text" id="wfName" placeholder="股票名称" value="${esc(item.name)}">
      <input type="text" id="wfTicker" placeholder="代码（可选）" value="${esc(item.ticker||"")}">
      <textarea id="wfNotes" placeholder="备注（可选）">${esc(item.notes||"")}</textarea>
      <div class="wl-form-actions">
        <button class="wl-cancel" onclick="renderWl()">取消</button>
        <button class="wl-save" onclick="saveWlItem(${idx!=null?idx:-1})">保存</button>
      </div>
    </div>
  `;
  if(idx!=null){
    document.getElementById("wli-"+idx).outerHTML=formHtml;
  }else{
    body.insertAdjacentHTML("afterbegin",formHtml);
  }
  document.getElementById("wfName").focus();
}

function saveWlItem(idx){
  const name=document.getElementById("wfName").value.trim();
  if(!name)return;
  const ticker=document.getElementById("wfTicker").value.trim();
  const notes=document.getElementById("wfNotes").value.trim();
  const list=loadWl();
  const item={name,ticker,notes,date:new Date().toISOString().slice(0,10)};
  if(idx>=0){list[idx]=item;}else{list.unshift(item);}
  saveWl(list);
  updateWlCnt();
  renderWl();
}

function editWlItem(idx){showWlForm(idx);}

function deleteWlItem(idx){
  const list=loadWl();
  list.splice(idx,1);
  saveWl(list);
  updateWlCnt();
  renderWl();
}

// Notes system (localStorage)
const NOTES_KEY="inv-dashboard-notes";
let notesView="date";
let pendingQuote="";

function loadNotes(){try{return JSON.parse(localStorage.getItem(NOTES_KEY))||[];}catch(e){return[];}}
function saveNotes(list){localStorage.setItem(NOTES_KEY,JSON.stringify(list));}
function updateNotesCnt(){document.getElementById("notesCnt").textContent=loadNotes().length;}

// Text selection → popover
let selRect=null;
document.addEventListener("mouseup",e=>{
  const pop=document.getElementById("selPop");
  const form=document.getElementById("noteFormWrap");
  if(pop.contains(e.target)||form.contains(e.target))return;
  const sel=window.getSelection();
  const text=sel.toString().trim();
  const detBody=document.getElementById("detailBody");
  if(!text||!detBody||!detBody.contains(sel.anchorNode)){
    pop.style.display="none";
    return;
  }
  const range=sel.getRangeAt(0);
  const rect=range.getBoundingClientRect();
  const container=document.querySelector(".right");
  const cr=container.getBoundingClientRect();
  const popH=32;
  const spaceBelow=cr.bottom-rect.bottom;
  let x=rect.left-cr.left+rect.width/2-40;
  let y;
  if(spaceBelow>popH+8){
    y=rect.bottom-cr.top+4;
  }else{
    y=rect.top-cr.top-popH-4;
  }
  pop.style.left=Math.max(4,x)+"px";
  pop.style.top=y+"px";
  pop.style.display="block";
  pendingQuote=text;
  selRect=rect;
});

document.addEventListener("mousedown",e=>{
  const pop=document.getElementById("selPop");
  const form=document.getElementById("noteFormWrap");
  if(!pop.contains(e.target)&&!form.contains(e.target)){
    pop.style.display="none";
  }
});

function showNoteForm(){
  const pop=document.getElementById("selPop");
  pop.style.display="none";
  const form=document.getElementById("noteFormWrap");
  const container=document.querySelector(".right");
  const cr=container.getBoundingClientRect();
  const formW=320,formH=220;
  let x,y;
  if(selRect){
    x=selRect.left-cr.left+selRect.width/2-formW/2;
    const spaceBelow=cr.bottom-selRect.bottom;
    if(spaceBelow>formH+12){
      y=selRect.bottom-cr.top+8;
    }else{
      y=selRect.top-cr.top-formH-8;
    }
  }else{
    x=(cr.width-formW)/2;
    y=80;
  }
  x=Math.max(8,Math.min(x,cr.width-formW-8));
  y=Math.max(8,Math.min(y,cr.height-formH-8));
  form.style.left=x+"px";
  form.style.top=y+"px";
  form.style.right="auto";
  form.style.display="block";
  document.getElementById("nfQuote").textContent=pendingQuote.length>300?pendingQuote.slice(0,300)+"…":pendingQuote;
  document.getElementById("nfComment").value="";
  document.getElementById("nfComment").focus();
  window.getSelection().removeAllRanges();
}

function hideNoteForm(){
  document.getElementById("noteFormWrap").style.display="none";
  pendingQuote="";
}

function saveNote(){
  const comment=document.getElementById("nfComment").value.trim();
  if(!comment&&!pendingQuote)return;
  const s=STOCKS.find(x=>x.id===selId);
  const note={
    id:Date.now(),
    stockId:selId||"",
    stockName:s?s.name:"Unknown",
    ticker:s?s.ticker:"",
    quote:pendingQuote,
    comment:comment,
    date:new Date().toISOString().slice(0,10)
  };
  const list=loadNotes();
  list.unshift(note);
  saveNotes(list);
  updateNotesCnt();
  hideNoteForm();
}

function toggleNotes(){
  const p=document.getElementById("notesPanel");
  const isOpen=p.classList.contains("open");
  closeAllPanels();
  if(!isOpen){p.classList.add("open");renderNotes();}
}

function setNotesView(view,btn){
  notesView=view;
  document.querySelectorAll(".notes-tab").forEach(t=>t.classList.remove("on"));
  btn.classList.add("on");
  renderNotes();
}

function renderNotes(){
  const body=document.getElementById("notesBody");
  const list=loadNotes();
  if(!list.length){body.innerHTML=`<div class="notes-empty">还没有笔记，在 Thesis 中选中文字即可添加</div>`;return;}

  let grouped={};
  if(notesView==="date"){
    list.forEach(n=>{const d=n.date||"Unknown";if(!grouped[d])grouped[d]=[];grouped[d].push(n);});
  }else{
    list.forEach(n=>{const k=n.stockName||"Unknown";if(!grouped[k])grouped[k]=[];grouped[k].push(n);});
  }

  let h="";
  for(const[key,notes] of Object.entries(grouped)){
    h+=`<div class="note-group"><div class="note-group-hd">${esc(key)}</div>`;
    for(const n of notes){
      const meta=notesView==="date"?n.stockName:n.date;
      h+=`<div class="note-card">
        <div class="note-card-top">
          <span class="note-card-stock">${esc(meta)}${n.ticker&&notesView==="date"?" · "+esc(n.ticker):""}</span>
          <div class="note-card-actions">
            <button onclick="deleteNote(${n.id})" title="Delete">✕</button>
          </div>
        </div>
        ${n.quote?`<div class="note-card-quote">${esc(n.quote)}</div>`:""}
        ${n.comment?`<div class="note-card-comment">${esc(n.comment)}</div>`:""}
      </div>`;
    }
    h+=`</div>`;
  }
  body.innerHTML=h;
}

function deleteNote(id){
  let list=loadNotes();
  list=list.filter(n=>n.id!==id);
  saveNotes(list);
  updateNotesCnt();
  renderNotes();
}

function downloadNotes(){
  const list=loadNotes();
  if(!list.length)return;
  let grouped={};
  if(notesView==="date"){
    list.forEach(n=>{const d=n.date||"Unknown";if(!grouped[d])grouped[d]=[];grouped[d].push(n);});
  }else{
    list.forEach(n=>{const k=n.stockName||"Unknown";if(!grouped[k])grouped[k]=[];grouped[k].push(n);});
  }
  let md=`# Investment Notes (${notesView==="date"?"By Date":"By Stock"})\n\nExported: ${new Date().toISOString().slice(0,10)}\n\n`;
  for(const[key,notes] of Object.entries(grouped)){
    md+=`## ${key}\n\n`;
    for(const n of notes){
      const meta=notesView==="date"?`${n.stockName} (${n.ticker})`:`${n.date}`;
      md+=`### ${meta}\n\n`;
      if(n.quote)md+=`> ${n.quote.replace(/\n/g,"\n> ")}\n\n`;
      if(n.comment)md+=`${n.comment}\n\n`;
      md+=`---\n\n`;
    }
  }
  const blob=new Blob([md],{type:"text/markdown"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`notes-${notesView}-${new Date().toISOString().slice(0,10)}.md`;
  a.click();
  URL.revokeObjectURL(url);
}

// Init
renderFilters();
renderTable();
fetchPrices();
updateWlCnt();
updateNotesCnt();
</script>
