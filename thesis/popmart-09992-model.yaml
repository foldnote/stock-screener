# ============================================================
# Layer 2: ASSUMPTIONS（你的判断，随时可调）
# ============================================================
# 每个参数标注对应 thesis/monitor 的哪个假设

assumptions:
  # --- 收入增长 ---
  # 对应 thesis 假设#2（海外扩张）+ monitor Kill#1（LABUBU占比）
  revenue_growth_pct:
    2026E: 20     # 管理层指引"不低于20%"
    2027E: 15     # 增速继续换挡，海外扩张贡献递减
    2028E: 12     # 稳态增长

  # --- 收入结构 ---
  overseas_revenue_pct:
    2026E: 48     # 海外继续快于国内
    2027E: 52
    2028E: 55

  # 对应 thesis 假设#1（IP平台能力）
  labubu_share_pct:
    2026E: 35     # 假设略降，新IP接棒
    2027E: 30
    2028E: 25

  # --- 利润率 ---
  # 对应 thesis 假设#3（财务质量）
  gross_margin_pct:
    2026E: 70     # 海外物流/关税压力 + 产品结构变化
    2027E: 69
    2028E: 68

  sga_pct:
    2026E: 28     # 海外扩张期费用率回升
    2027E: 27
    2028E: 26

  # 有效税率（推测，包含HK优惠税率+内地税）
  effective_tax_rate_pct: 20

  # --- 资本开支 ---
  # 乐园 + 海外门店 + 产能
  capex_pct:
    2026E: 4.0    # 乐园投资增加
    2027E: 3.5
    2028E: 3.0

  # --- 营运资本 ---
  # 对应 monitor Kill#3（存货周转）
  inventory_days:
    2026E: 135    # 海外备货周期更长，继续恶化
    2027E: 130
    2028E: 125

  # --- 股本 ---
  shares_million:
    2026E: 1325   # 小幅回购
    2027E: 1320
    2028E: 1315

  # --- 估值参数 ---
  target_pe: 18          # 合理PE中枢（消费品成长股）
  discount_rate_pct: 10  # WACC proxy
  terminal_growth_pct: 3 # 永续增长率

# ============================================================
# Layer 3: SCENARIOS（预设假设组合）
# ============================================================
# 改一个场景 = 改几个参数，然后让 Claude 重新算

scenarios:

  # 场景A：海外持续爆发 + 新IP接棒成功
  # thesis全面验证，市场重新给予成长溢价
  a_overseas_boom_new_ip:
    revenue_growth_pct:  { 2026E: 30, 2027E: 25, 2028E: 20 }
    gross_margin_pct:    { 2026E: 72, 2027E: 71, 2028E: 70 }
    sga_pct:             { 2026E: 26, 2027E: 25, 2028E: 24 }
    labubu_share_pct:    { 2026E: 32, 2027E: 25, 2028E: 20 }
    target_pe: 22
    trigger: "H1海外增速>80% + 非LABUBU新IP单季占比>15%"
    thesis_link: "假设#1#2全部验证"

  # 场景B：符合管理层指引，稳健增长
  # base case，当前assumptions就是这个场景
  b_guided_growth:
    revenue_growth_pct:  { 2026E: 20, 2027E: 15, 2028E: 12 }
    gross_margin_pct:    { 2026E: 70, 2027E: 69, 2028E: 68 }
    sga_pct:             { 2026E: 28, 2027E: 27, 2028E: 26 }
    labubu_share_pct:    { 2026E: 35, 2027E: 30, 2028E: 25 }
    target_pe: 18
    trigger: "管理层指引兑现，无重大意外"
    thesis_link: "base case"

  # 场景C：LABUBU衰退 + 海外减速
  # thesis假设#1被挑战
  c_labubu_fade:
    revenue_growth_pct:  { 2026E: 8, 2027E: 5, 2028E: 3 }
    gross_margin_pct:    { 2026E: 66, 2027E: 64, 2028E: 62 }
    sga_pct:             { 2026E: 32, 2027E: 33, 2028E: 34 }
    labubu_share_pct:    { 2026E: 42, 2027E: 45, 2028E: 48 }  # 占比反而升（其他IP更差）
    inventory_days:      { 2026E: 150, 2027E: 160, 2028E: 165 }
    target_pe: 12
    trigger: "LABUBU二手溢价倒挂 + 海外同店转负"
    thesis_link: "假设#1失败，Kill#1接近触发"

  # 场景D：行业见顶 + 存货危机（压力测试）
  # 最差合理场景，用于计算安全边际
  d_industry_peak_inventory_crisis:
    revenue_growth_pct:  { 2026E: 0, 2027E: -10, 2028E: -5 }
    gross_margin_pct:    { 2026E: 60, 2027E: 55, 2028E: 55 }
    sga_pct:             { 2026E: 38, 2027E: 42, 2028E: 40 }
    inventory_days:      { 2026E: 170, 2027E: 180, 2028E: 160 }
    target_pe: 8
    trigger: "潮玩品类整体收缩 + 渠道常态折扣 + 存货减值"
    thesis_link: "Kill#3触发 + 风险#2（行业见顶）"

# ============================================================
# VALUATION ANCHORS（估值锚点，Claude计算时参考）
# ============================================================

valuation_anchors:
  # PE法
  pe_range:
    floor: 8       # 行业见顶、增长归零
    low: 12        # 增长降至个位数
    mid: 18        # 稳健增长15-20%
    high: 25       # 高增长30%+，thesis全面验证
  pe_history_note: "上市以来PE范围约10x-55x，2025年从50x压到15x"

  # FCF Yield法
  fcf_yield_note: "FY25 FCF=98.8亿, 市值~1900亿RMB → FCF Yield≈5.2%"
  risk_free_rate_pct: 1.76  # 10Y中国国债

  # 可比公司PE（参考）
  comps:
    hermes: 50     # 奢侈品，稳定高增长
    lvmh: 22       # 奢侈品集团
    mnso: 15       # 名创优品，相似赛道
    funko: 12      # Funko，品类衰退中

# ============================================================
# COMPUTATION GUIDE（给Claude的计算指引）
# ============================================================
#
# 标准推演公式：
#   Revenue_t   = Revenue_(t-1) × (1 + growth_rate)
#   Gross_Profit = Revenue × gross_margin
#   SGA          = Revenue × sga_pct
#   EBIT        ≈ Gross_Profit - SGA
#   Net_Income  ≈ EBIT × (1 - tax_rate)  [简化，忽略利息收入]
#   FCF         ≈ Net_Income × fcf_to_ni_ratio  [用历史均值~1.0x]
#                 或 = Net_Income + D&A - Capex - ΔWorkingCapital
#   EPS          = Net_Income / shares
#   Target_Price = EPS × target_PE × (1/hkd_rmb_rate)  [转HKD]
#
# 敏感性分析：
#   行参数 = revenue_growth_pct
#   列参数 = target_pe 或 gross_margin_pct
#   单元格 = 对应的 Target_Price (HKD)
#
# 安全边际：
#   最差合理场景(scenario_d) 的估值 vs 当前价格
#   如果当前价格 < scenario_d估值 → 有安全边际
